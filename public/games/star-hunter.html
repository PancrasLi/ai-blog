<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>无尽星辰猎人 - Star Hunter</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            font-family: 'Arial', sans-serif;
        }
        #gameContainer {
            position: relative;
            width: 800px;
            height: 600px;
            background: radial-gradient(circle at 50% 50%, #0f1b2e 0%, #0a0e1a 100%);
            border: 3px solid #00d4ff;
            box-shadow: 0 0 30px rgba(0, 212, 255, 0.3);
            overflow: hidden;
            border-radius: 8px;
        }
        canvas {
            display: block;
            width: 100%;
            height: 100%;
            background: transparent;
        }
        #hud {
            position: absolute;
            top: 20px;
            left: 20px;
            right: 20px;
            color: #00d4ff;
            font-weight: bold;
            z-index: 10;
            display: flex;
            justify-content: space-between;
            font-size: 18px;
            text-shadow: 0 0 10px rgba(0, 212, 255, 0.5);
        }
        #gameOver {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.95);
            padding: 40px;
            border-radius: 8px;
            text-align: center;
            color: #00d4ff;
            z-index: 100;
            display: none;
            min-width: 300px;
            border: 3px solid #ff00ff;
        }
        #gameOver h1 { font-size: 32px; margin-bottom: 20px; text-shadow: 0 0 20px #ff00ff; }
        #gameOver p { font-size: 20px; margin: 10px 0; }
        #gameOver button {
            margin-top: 20px;
            padding: 10px 30px;
            font-size: 16px;
            background: #ff00ff;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
        }
        #gameOver button:hover { background: #ff33ff; }
        #instructions {
            position: absolute;
            bottom: 15px;
            left: 20px;
            right: 20px;
            color: #00aa88;
            font-size: 13px;
            text-align: center;
            opacity: 0.7;
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <canvas id="gameCanvas" width="800" height="600"></canvas>
        <div id="hud">
            <div>⭐ 星数: <span id="stars">0</span></div>
            <div>⚡ 倍速: <span id="multiplier">1x</span></div>
            <div>❤️ 生命: <span id="health">3</span></div>
        </div>
        <div id="gameOver">
            <h1>游戏结束</h1>
            <p>最终得分: <span id="finalScore">0</span></p>
            <p>收集星数: <span id="finalStars">0</span></p>
            <p>最高倍速: <span id="maxMultiplier">1x</span></p>
            <button onclick="location.reload()">重新开始</button>
        </div>
        <div id="instructions">
            ⌨️ 方向键/WASD 移动 | 空格快速移动 | 收集星星 🌟 避开陨石 💨
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        class Game {
            constructor() {
                this.player = { x: 400, y: 550, w: 20, h: 20, speed: 6 };
                this.stars = [];
                this.meteors = [];
                this.particles = [];
                this.score = 0;
                this.health = 3;
                this.multiplier = 1;
                this.maxMultiplier = 1;
                this.level = 0;
                this.gameOver = false;
                this.keys = {};
                this.spawnCounter = 0;
                this.speedBoost = false;
                
                this.setupControls();
                this.gameLoop();
            }

            setupControls() {
                window.addEventListener('keydown', (e) => {
                    this.keys[e.key.toLowerCase()] = true;
                    if (e.key === ' ') this.speedBoost = true;
                });
                window.addEventListener('keyup', (e) => {
                    this.keys[e.key.toLowerCase()] = false;
                    if (e.key === ' ') this.speedBoost = false;
                });
            }

            updateHUD() {
                document.getElementById('stars').textContent = this.score;
                document.getElementById('multiplier').textContent = this.multiplier + 'x';
                document.getElementById('health').textContent = this.health;
            }

            spawnStar() {
                const x = Math.random() * (canvas.width - 20) + 10;
                const y = -20;
                this.stars.push({ x, y, w: 15, h: 15, velocity: 2 + this.level * 0.5 });
            }

            spawnMeteor() {
                const size = 15 + Math.random() * 10;
                const x = Math.random() * (canvas.width - size);
                const y = -size;
                const velocity = 3 + this.level * 0.7 + Math.random() * 2;
                this.meteors.push({ x, y, w: size, h: size, velocity, rotation: Math.random() * Math.PI * 2 });
            }

            updatePlayer() {
                const moveSpeed = this.speedBoost ? this.player.speed * 2 : this.player.speed;
                if (this.keys['arrowleft'] || this.keys['a']) this.player.x -= moveSpeed;
                if (this.keys['arrowright'] || this.keys['d']) this.player.x += moveSpeed;
                if (this.keys['arrowup'] || this.keys['w']) this.player.y -= moveSpeed;
                if (this.keys['arrowdown'] || this.keys['s']) this.player.y += moveSpeed;

                this.player.x = Math.max(0, Math.min(canvas.width - this.player.w, this.player.x));
                this.player.y = Math.max(0, Math.min(canvas.height - this.player.h, this.player.y));
            }

            updateStars() {
                for (let i = this.stars.length - 1; i >= 0; i--) {
                    this.stars[i].y += this.stars[i].velocity;
                    if (this.stars[i].y > canvas.height) {
                        this.stars.splice(i, 1);
                    }
                }
            }

            updateMeteors() {
                for (let i = this.meteors.length - 1; i >= 0; i--) {
                    this.meteors[i].y += this.meteors[i].velocity;
                    this.meteors[i].rotation += 0.05;
                    if (this.meteors[i].y > canvas.height) {
                        this.meteors.splice(i, 1);
                    }
                }
            }

            collisionDetect() {
                for (let i = this.stars.length - 1; i >= 0; i--) {
                    const star = this.stars[i];
                    if (this.checkCollision(this.player, star)) {
                        this.score += this.multiplier;
                        this.maxMultiplier = Math.max(this.maxMultiplier, this.multiplier);
                        this.multiplier = Math.min(10, this.multiplier + 0.1);
                        this.createParticles(star.x, star.y, '#00ff00');
                        this.stars.splice(i, 1);
                        this.level = Math.floor(this.score / 20);
                    }
                }

                for (let i = this.meteors.length - 1; i >= 0; i--) {
                    const meteor = this.meteors[i];
                    if (this.checkCollision(this.player, meteor)) {
                        this.health--;
                        this.multiplier = Math.max(1, this.multiplier - 0.5);
                        this.createParticles(meteor.x, meteor.y, '#ff0000', 10);
                        this.meteors.splice(i, 1);
                        if (this.health <= 0) {
                            this.endGame();
                        }
                    }
                }
            }

            checkCollision(a, b) {
                return a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y;
            }

            createParticles(x, y, color, count = 5) {
                for (let i = 0; i < count; i++) {
                    const angle = Math.random() * Math.PI * 2;
                    const speed = Math.random() * 3 + 1;
                    this.particles.push({
                        x, y,
                        vx: Math.cos(angle) * speed,
                        vy: Math.sin(angle) * speed,
                        life: 30,
                        color
                    });
                }
            }

            updateParticles() {
                for (let i = this.particles.length - 1; i >= 0; i--) {
                    const p = this.particles[i];
                    p.x += p.vx;
                    p.y += p.vy;
                    p.vy += 0.2;
                    p.life--;
                    if (p.life <= 0) this.particles.splice(i, 1);
                }
            }

            endGame() {
                this.gameOver = true;
                document.getElementById('gameOver').style.display = 'block';
                document.getElementById('finalScore').textContent = this.score;
                document.getElementById('finalStars').textContent = this.score;
                document.getElementById('maxMultiplier').textContent = this.maxMultiplier.toFixed(1) + 'x';
            }

            draw() {
                ctx.fillStyle = 'rgba(15, 27, 46, 0.1)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);

                ctx.fillStyle = '#00d4ff';
                ctx.shadowColor = 'rgba(0, 212, 255, 0.8)';
                ctx.shadowBlur = 10;
                ctx.fillRect(this.player.x, this.player.y, this.player.w, this.player.h);
                ctx.shadowBlur = 0;

                this.stars.forEach(star => {
                    ctx.save();
                    ctx.translate(star.x + 7.5, star.y + 7.5);
                    ctx.rotate(Date.now() * 0.001);
                    ctx.fillStyle = '#ffff00';
                    ctx.shadowColor = 'rgba(255, 255, 0, 0.8)';
                    ctx.shadowBlur = 8;
                    this.drawStar(0, 0, 5, 10, 5);
                    ctx.restore();
                });

                this.meteors.forEach(meteor => {
                    ctx.save();
                    ctx.translate(meteor.x + meteor.w / 2, meteor.y + meteor.h / 2);
                    ctx.rotate(meteor.rotation);
                    ctx.fillStyle = '#ff6600';
                    ctx.shadowColor = 'rgba(255, 102, 0, 0.8)';
                    ctx.shadowBlur = 8;
                    ctx.fillRect(-meteor.w / 2, -meteor.h / 2, meteor.w, meteor.h);
                    ctx.restore();
                });

                this.particles.forEach(p => {
                    ctx.fillStyle = p.color;
                    ctx.globalAlpha = p.life / 30;
                    ctx.fillRect(p.x, p.y, 3, 3);
                    ctx.globalAlpha = 1;
                });

                ctx.shadowColor = 'transparent';
            }

            drawStar(cx, cy, spikes, outerRadius, innerRadius) {
                let rot = Math.PI / 2 * 3;
                let step = Math.PI / spikes;
                ctx.beginPath();
                ctx.moveTo(cx, cy - outerRadius);
                for (let i = 0; i < spikes; i++) {
                    ctx.lineTo(cx + Math.cos(rot) * outerRadius, cy + Math.sin(rot) * outerRadius);
                    rot += step;
                    ctx.lineTo(cx + Math.cos(rot) * innerRadius, cy + Math.sin(rot) * innerRadius);
                    rot += step;
                }
                ctx.lineTo(cx, cy - outerRadius);
                ctx.closePath();
                ctx.fill();
            }

            update() {
                if (this.gameOver) return;

                this.updatePlayer();
                this.updateStars();
                this.updateMeteors();
                this.updateParticles();
                this.collisionDetect();
                this.updateHUD();

                this.spawnCounter++;
                if (this.spawnCounter % Math.max(30 - this.level * 2, 10) === 0) {
                    this.spawnStar();
                }
                if (this.spawnCounter % Math.max(60 - this.level, 30) === 0) {
                    this.spawnMeteor();
                }
            }

            gameLoop() {
                this.update();
                this.draw();
                requestAnimationFrame(() => this.gameLoop());
            }
        }

        const game = new Game();
    </script>
</body>
</html>
