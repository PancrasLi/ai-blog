<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⭐ 星星猎手</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: 'Arial', sans-serif;
        }
        .container {
            position: relative;
            width: 800px;
            height: 600px;
            background: #0a0e27;
            border-radius: 10px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }
        canvas { display: block; }
        .ui {
            position: absolute;
            top: 20px;
            left: 20px;
            right: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: #fff;
            font-size: 18px;
            z-index: 10;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }
        .score { font-weight: bold; color: #ffd700; }
        .level { font-weight: bold; color: #00ff7f; }
        .timer { font-weight: bold; color: #ff6b6b; }
        .gameover {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.9);
            padding: 40px;
            border-radius: 10px;
            text-align: center;
            color: #fff;
            z-index: 20;
            display: none;
            min-width: 300px;
        }
        .gameover h1 { font-size: 36px; margin-bottom: 20px; color: #ffd700; }
        .gameover p { font-size: 18px; margin: 10px 0; }
        .gameover button {
            margin-top: 20px;
            padding: 12px 30px;
            font-size: 16px;
            background: #667eea;
            color: #fff;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .gameover button:hover { background: #764ba2; transform: scale(1.05); }
    </style>
</head>
<body>
    <div class="container">
        <div class="ui">
            <div>分数: <span class="score" id="score">0</span></div>
            <div>关卡: <span class="level" id="level">1</span></div>
            <div>时间: <span class="timer" id="timer">60</span>s</div>
        </div>
        <canvas id="gameCanvas" width="800" height="600"></canvas>
        <div class="gameover" id="gameover">
            <h1>游戏结束!</h1>
            <p>最终分数: <span id="finalScore">0</span></p>
            <p>达到关卡: <span id="finalLevel">1</span></p>
            <button onclick="location.reload()">再玩一次</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        let game = {
            score: 0,
            level: 1,
            time: 60,
            running: true,
            gameStartTime: Date.now()
        };

        let stars = [];
        let particles = [];

        class Star {
            constructor() {
                this.x = Math.random() * (canvas.width - 40) + 20;
                this.y = -30;
                this.size = 20;
                this.speedY = 2 + game.level * 0.5;
                this.rotation = Math.random() * Math.PI * 2;
                this.rotationSpeed = (Math.random() - 0.5) * 0.1;
            }

            update() {
                this.y += this.speedY;
                this.rotation += this.rotationSpeed;
            }

            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.rotation);
                
                // 绘制星星
                ctx.fillStyle = '#FFD700';
                ctx.beginPath();
                for (let i = 0; i < 5; i++) {
                    const angle = (i * 4 * Math.PI) / 5 - Math.PI / 2;
                    const x = Math.cos(angle) * this.size;
                    const y = Math.sin(angle) * this.size;
                    if (i === 0) ctx.moveTo(x, y);
                    else ctx.lineTo(x, y);
                }
                ctx.closePath();
                ctx.fill();
                
                // 星星光晕
                ctx.strokeStyle = 'rgba(255, 215, 0, 0.6)';
                ctx.lineWidth = 2;
                ctx.stroke();
                
                ctx.restore();
            }

            isClicked(mx, my) {
                const dist = Math.sqrt((this.x - mx) ** 2 + (this.y - my) ** 2);
                return dist < this.size + 5;
            }

            isOutOfBounds() {
                return this.y > canvas.height + 50;
            }
        }

        class Particle {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.vx = (Math.random() - 0.5) * 8;
                this.vy = (Math.random() - 0.5) * 8 - 2;
                this.life = 30;
                this.maxLife = 30;
            }

            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.vy += 0.2; // 重力
                this.life--;
            }

            draw() {
                ctx.save();
                ctx.globalAlpha = this.life / this.maxLife;
                ctx.fillStyle = '#FFD700';
                ctx.beginPath();
                ctx.arc(this.x, this.y, 3, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            }

            isDead() {
                return this.life <= 0;
            }
        }

        function createStar() {
            if (game.running) {
                stars.push(new Star());
            }
        }

        function createParticles(x, y) {
            for (let i = 0; i < 10; i++) {
                particles.push(new Particle(x, y));
            }
        }

        function update() {
            if (!game.running) return;

            // 更新时间
            game.time = Math.max(0, 60 - Math.floor((Date.now() - game.gameStartTime) / 1000));
            if (game.time <= 0) {
                endGame();
                return;
            }

            // 生成新星星
            const spawnRate = Math.max(300 - game.level * 30, 100);
            if (Math.random() < 1 / (spawnRate / 16)) {
                createStar();
            }

            // 更新星星
            for (let i = stars.length - 1; i >= 0; i--) {
                stars[i].update();
                if (stars[i].isOutOfBounds()) {
                    stars.splice(i, 1);
                    game.level = Math.max(1, game.level - 0.1);
                }
            }

            // 更新粒子
            for (let i = particles.length - 1; i >= 0; i--) {
                particles[i].update();
                if (particles[i].isDead()) {
                    particles.splice(i, 1);
                }
            }

            // 更新关卡
            const baseLevel = Math.floor(game.score / 50) + 1;
            game.level = Math.max(baseLevel, game.level);
        }

        function draw() {
            // 清屏
            ctx.fillStyle = '#0a0e27';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // 绘制背景网格
            ctx.strokeStyle = 'rgba(102, 126, 234, 0.1)';
            ctx.lineWidth = 1;
            for (let i = 0; i < canvas.width; i += 50) {
                ctx.beginPath();
                ctx.moveTo(i, 0);
                ctx.lineTo(i, canvas.height);
                ctx.stroke();
            }

            // 绘制星星
            stars.forEach(star => star.draw());

            // 绘制粒子
            particles.forEach(p => p.draw());

            // 更新UI
            document.getElementById('score').textContent = game.score;
            document.getElementById('level').textContent = game.level;
            document.getElementById('timer').textContent = game.time;
        }

        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }

        function endGame() {
            game.running = false;
            document.getElementById('finalScore').textContent = game.score;
            document.getElementById('finalLevel').textContent = Math.floor(game.level);
            document.getElementById('gameover').style.display = 'block';
        }

        canvas.addEventListener('click', (e) => {
            if (!game.running) return;
            
            const rect = canvas.getBoundingClientRect();
            const mx = e.clientX - rect.left;
            const my = e.clientY - rect.top;

            for (let i = stars.length - 1; i >= 0; i--) {
                if (stars[i].isClicked(mx, my)) {
                    game.score += Math.ceil(game.level);
                    createParticles(stars[i].x, stars[i].y);
                    stars.splice(i, 1);
                    break;
                }
            }
        });

        // 触摸支持
        canvas.addEventListener('touchstart', (e) => {
            if (!game.running) return;
            const touch = e.touches[0];
            const rect = canvas.getBoundingClientRect();
            const mx = touch.clientX - rect.left;
            const my = touch.clientY - rect.top;

            for (let i = stars.length - 1; i >= 0; i--) {
                if (stars[i].isClicked(mx, my)) {
                    game.score += Math.ceil(game.level);
                    createParticles(stars[i].x, stars[i].y);
                    stars.splice(i, 1);
                    break;
                }
            }
        });

        // 开始游戏
        gameLoop();
    </script>
</body>
</html>
