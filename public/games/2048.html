<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>2048 游戏</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Arial', sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    }

    .container {
      text-align: center;
      background: white;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 10px 50px rgba(0, 0, 0, 0.3);
    }

    h1 {
      color: #333;
      margin-bottom: 10px;
      font-size: 32px;
    }

    .info {
      display: flex;
      justify-content: space-around;
      margin-bottom: 20px;
      gap: 20px;
    }

    .score-box {
      background: #f0f0f0;
      padding: 15px 25px;
      border-radius: 5px;
      min-width: 120px;
    }

    .score-box h3 {
      color: #999;
      font-size: 12px;
      margin-bottom: 5px;
    }

    .score-box p {
      color: #333;
      font-size: 28px;
      font-weight: bold;
    }

    #game {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
      width: 340px;
      height: 340px;
      background: #bbada0;
      border-radius: 6px;
      padding: 10px;
      margin: 20px auto;
    }

    .tile {
      background: #cdc1b4;
      border-radius: 3px;
      font-weight: bold;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 35px;
      transition: all 0.15s ease-in-out;
    }

    .tile.new {
      animation: newTile 0.3s;
    }

    @keyframes newTile {
      0% { transform: scale(0.5); opacity: 0; }
      50% { transform: scale(1.1); }
      100% { transform: scale(1); opacity: 1; }
    }

    .tile.merged {
      animation: merge 0.3s;
    }

    @keyframes merge {
      0% { transform: scale(1.2); }
      100% { transform: scale(1); }
    }

    /* 颜色方案 */
    .tile-2 { background: #eee4da; color: #776e65; }
    .tile-4 { background: #ede0c8; color: #776e65; }
    .tile-8 { background: #f2b179; color: #f9f6f2; }
    .tile-16 { background: #f59563; color: #f9f6f2; }
    .tile-32 { background: #f67c5f; color: #f9f6f2; }
    .tile-64 { background: #f65e3b; color: #f9f6f2; }
    .tile-128 { background: #edcf72; color: #f9f6f2; font-size: 30px; }
    .tile-256 { background: #edcc61; color: #f9f6f2; font-size: 30px; }
    .tile-512 { background: #edc850; color: #f9f6f2; font-size: 30px; }
    .tile-1024 { background: #edc53f; color: #f9f6f2; font-size: 25px; }
    .tile-2048 { background: #edc22e; color: #f9f6f2; font-size: 25px; }
    .tile-4096 { background: #eee4da; color: #776e65; font-size: 20px; }

    .controls {
      margin-top: 20px;
      display: flex;
      gap: 10px;
      justify-content: center;
    }

    button {
      padding: 12px 30px;
      font-size: 16px;
      background: #667eea;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      transition: background 0.3s;
    }

    button:hover {
      background: #764ba2;
    }

    .instructions {
      margin-top: 20px;
      color: #666;
      font-size: 14px;
      text-align: left;
      background: #f9f9f9;
      padding: 15px;
      border-radius: 5px;
    }

    .game-over {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.5);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 1000;
      display: none;
    }

    .game-over.show {
      display: flex;
    }

    .game-over-box {
      background: white;
      padding: 40px;
      border-radius: 10px;
      text-align: center;
    }

    .game-over-box h2 {
      font-size: 32px;
      margin-bottom: 20px;
      color: #333;
    }

    .game-over-box p {
      font-size: 20px;
      color: #666;
      margin-bottom: 20px;
    }

    .game-over-box button {
      margin-top: 20px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>2048</h1>

    <div class="info">
      <div class="score-box">
        <h3>SCORE</h3>
        <p id="score">0</p>
      </div>
      <div class="score-box">
        <h3>BEST</h3>
        <p id="best">0</p>
      </div>
    </div>

    <div id="game"></div>

    <div class="controls">
      <button onclick="initGame()">新游戏</button>
      <button onclick="undo()">撤销</button>
    </div>

    <div class="instructions">
      <strong>怎么玩：</strong><br>
      • 使用方向键或 WASD 移动瓷砖<br>
      • 相同数字的瓷砖相接合并成新数字<br>
      • 合并到 2048 获胜！<br>
      • 无法移动时游戏结束
    </div>
  </div>

  <div class="game-over" id="gameOverModal">
    <div class="game-over-box">
      <h2 id="gameOverTitle">游戏结束!</h2>
      <p>你的分数: <span id="finalScore">0</span></p>
      <button onclick="initGame(); document.getElementById('gameOverModal').classList.remove('show')">重新开始</button>
    </div>
  </div>

  <script>
    const GRID_SIZE = 4;
    let grid = [];
    let score = 0;
    let best = localStorage.getItem('2048Best') || 0;
    let history = [];

    class Tile {
      constructor(value = 2) {
        this.value = value;
        this.isNew = true;
        this.isMerged = false;
      }
    }

    function initGame() {
      grid = Array(GRID_SIZE).fill().map(() => Array(GRID_SIZE).fill(null));
      score = 0;
      history = [];
      addNewTile();
      addNewTile();
      updateDisplay();
      document.getElementById('gameOverModal').classList.remove('show');
    }

    function addNewTile() {
      const empty = getEmptyTiles();
      if (empty.length === 0) return;

      const { x, y } = empty[Math.floor(Math.random() * empty.length)];
      grid[y][x] = new Tile(Math.random() < 0.9 ? 2 : 4);
    }

    function getEmptyTiles() {
      const empty = [];
      for (let y = 0; y < GRID_SIZE; y++) {
        for (let x = 0; x < GRID_SIZE; x++) {
          if (!grid[y][x]) empty.push({ x, y });
        }
      }
      return empty;
    }

    function updateDisplay() {
      const gameDiv = document.getElementById('game');
      gameDiv.innerHTML = '';
      
      for (let y = 0; y < GRID_SIZE; y++) {
        for (let x = 0; x < GRID_SIZE; x++) {
          const tile = grid[y][x];
          const tileDiv = document.createElement('div');
          tileDiv.className = 'tile';
          
          if (tile) {
            tileDiv.textContent = tile.value;
            tileDiv.className += ` tile-${tile.value}`;
            if (tile.isNew) {
              tileDiv.classList.add('new');
              tile.isNew = false;
            }
            if (tile.isMerged) {
              tileDiv.classList.add('merged');
              tile.isMerged = false;
            }
          }
          gameDiv.appendChild(tileDiv);
        }
      }

      document.getElementById('score').textContent = score;
      document.getElementById('best').textContent = best;
    }

    function move(direction) {
      history.push(JSON.parse(JSON.stringify(grid)));
      const moved = false;

      for (let y = 0; y < GRID_SIZE; y++) {
        for (let x = 0; x < GRID_SIZE; x++) {
          if (!grid[y][x]) continue;

          let newX = x;
          let newY = y;

          if (direction === 'left') newX--;
          else if (direction === 'right') newX++;
          else if (direction === 'up') newY--;
          else if (direction === 'down') newY++;

          while (newX >= 0 && newX < GRID_SIZE && newY >= 0 && newY < GRID_SIZE) {
            if (!grid[newY][newX]) {
              grid[newY][newX] = grid[y][x];
              grid[y][x] = null;
              x = newX;
              y = newY;
            } else if (grid[newY][newX].value === grid[y][x].value && !grid[newY][newX].isMerged) {
              grid[newY][newX].value *= 2;
              grid[newY][newX].isMerged = true;
              score += grid[newY][newX].value;
              grid[y][x] = null;
              break;
            } else {
              break;
            }

            if (direction === 'left') newX--;
            else if (direction === 'right') newX++;
            else if (direction === 'up') newY--;
            else if (direction === 'down') newY++;
          }
        }
      }

      addNewTile();
      updateDisplay();

      if (score > best) {
        best = score;
        localStorage.setItem('2048Best', best);
      }

      if (isGameOver()) {
        document.getElementById('finalScore').textContent = score;
        document.getElementById('gameOverModal').classList.add('show');
      }
    }

    function isGameOver() {
      if (getEmptyTiles().length > 0) return false;
      
      for (let y = 0; y < GRID_SIZE; y++) {
        for (let x = 0; x < GRID_SIZE; x++) {
          const tile = grid[y][x];
          if (grid[y][x + 1] && grid[y][x + 1].value === tile.value) return false;
          if (grid[y + 1] && grid[y + 1][x] && grid[y + 1][x].value === tile.value) return false;
        }
      }
      return true;
    }

    function undo() {
      if (history.length === 0) return;
      grid = history.pop();
      updateDisplay();
    }

    document.addEventListener('keydown', (e) => {
      const keys = {
        'ArrowLeft': 'left', 'KeyA': 'left',
        'ArrowRight': 'right', 'KeyD': 'right',
        'ArrowUp': 'up', 'KeyW': 'up',
        'ArrowDown': 'down', 'KeyS': 'down'
      };

      if (keys[e.code]) {
        e.preventDefault();
        move(keys[e.code]);
      }
    });

    // 初始化游戏
    initGame();
  </script>
</body>
</html>
