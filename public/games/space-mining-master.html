<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>太空采矿大师 - Space Mining Master</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Arial', sans-serif; background: #0a0e27; overflow: hidden; }
        .container { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; }
        canvas { display: block; background: linear-gradient(180deg, #0a0e27 0%, #1a1f3a 50%, #0f1829 100%); border: 3px solid #00ff88; box-shadow: 0 0 20px rgba(0, 255, 136, 0.5); }
        .ui-panel { position: absolute; top: 20px; left: 20px; color: #00ff88; font-size: 14px; font-weight: bold; z-index: 10; }
        .ui-panel div { margin: 5px 0; }
        .score { color: #ffff00; }
        .health { color: #ff4444; }
        .level { color: #00ffff; }
        .controls { position: absolute; bottom: 20px; left: 20px; color: #888; font-size: 12px; }
        .modal { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(10, 14, 39, 0.95); border: 2px solid #00ff88; padding: 30px; border-radius: 10px; text-align: center; z-index: 100; }
        .modal h1 { color: #00ff88; margin-bottom: 15px; font-size: 28px; }
        .modal p { color: #aaa; margin: 10px 0; }
        .modal button { background: #00ff88; color: #0a0e27; border: none; padding: 10px 20px; margin-top: 20px; cursor: pointer; font-weight: bold; border-radius: 5px; }
        .modal button:hover { background: #00dd66; }
        .hidden { display: none; }
    </style>
</head>
<body>
    <div class="container">
        <div class="ui-panel">
            <div>💰 积分: <span class="score" id="score">0</span></div>
            <div>❤️ 生命: <span class="health" id="health">100</span></div>
            <div>⭐ 等级: <span class="level" id="level">1</span></div>
            <div id="wave" style="color: #00ffff;">🌊 波浪: <span id="waveNum">1</span></div>
        </div>
        <canvas id="gameCanvas" width="900" height="600"></canvas>
        <div class="controls">
            <p>⬅️➡️ 或 AD 移动 | 空格 发射 | 按 P 暂停</p>
        </div>
    </div>

    <div id="startModal" class="modal">
        <h1>🚀 太空采矿大师</h1>
        <p>操控采矿船在星际中采集矿物</p>
        <p>躲避陨石，升级装备，闯过难关！</p>
        <button onclick="startGame()">开始游戏</button>
    </div>

    <div id="gameOverModal" class="modal hidden">
        <h1>💥 游戏结束</h1>
        <p>最终积分: <span id="finalScore">0</span></p>
        <p>达到等级: <span id="finalLevel">1</span></p>
        <button onclick="location.reload()">重新开始</button>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // Game state
        let gameState = {
            running: false,
            paused: false,
            score: 0,
            health: 100,
            level: 1,
            wave: 1,
            gameTime: 0,
        };

        // Player ship
        const player = {
            x: canvas.width / 2,
            y: canvas.height - 40,
            width: 30,
            height: 30,
            speed: 5,
            velX: 0,
            shoot: () => {
                bullets.push({
                    x: player.x + player.width / 2,
                    y: player.y,
                    vx: 0,
                    vy: -8,
                    life: 100,
                });
            }
        };

        // Game arrays
        let bullets = [];
        let enemies = [];
        let particles = [];
        let minerals = [];

        // Keyboard input
        const keys = {};
        window.addEventListener('keydown', (e) => {
            keys[e.key.toLowerCase()] = true;
            if (e.key === ' ') { e.preventDefault(); player.shoot(); }
            if (e.key.toLowerCase() === 'p') togglePause();
        });
        window.addEventListener('keyup', (e) => {
            keys[e.key.toLowerCase()] = false;
        });

        function togglePause() {
            if (!gameState.running) return;
            gameState.paused = !gameState.paused;
        }

        function startGame() {
            document.getElementById('startModal').classList.add('hidden');
            gameState.running = true;
            gameState.paused = false;
            gameState.score = 0;
            gameState.health = 100;
            gameState.level = 1;
            gameState.wave = 1;
            gameState.gameTime = 0;
            bullets = [];
            enemies = [];
            particles = [];
            minerals = [];
            spawnWave();
            gameLoop();
        }

        function spawnWave() {
            const baseEnemies = 3 + gameState.wave * 2;
            for (let i = 0; i < baseEnemies; i++) {
                enemies.push({
                    x: Math.random() * (canvas.width - 40) + 20,
                    y: -30,
                    width: 20,
                    height: 20,
                    vx: (Math.random() - 0.5) * 4,
                    vy: 2 + gameState.wave * 0.5,
                    type: Math.random() < 0.7 ? 'asteroid' : 'mine',
                });
            }
        }

        function spawnMineral(x, y) {
            minerals.push({
                x: x,
                y: y,
                vx: (Math.random() - 0.5) * 3,
                vy: Math.random() * 2 - 2,
                life: 300,
            });
        }

        function createExplosion(x, y, count = 8) {
            for (let i = 0; i < count; i++) {
                const angle = (i / count) * Math.PI * 2;
                particles.push({
                    x: x,
                    y: y,
                    vx: Math.cos(angle) * (3 + Math.random() * 3),
                    vy: Math.sin(angle) * (3 + Math.random() * 3),
                    life: 30,
                    color: '#ff6600',
                });
            }
        }

        function update() {
            if (!gameState.running || gameState.paused) return;

            gameState.gameTime++;

            // Player movement
            player.velX = 0;
            if (keys['arrowleft'] || keys['a']) player.velX = -player.speed;
            if (keys['arrowright'] || keys['d']) player.velX = player.speed;
            player.x += player.velX;
            player.x = Math.max(0, Math.min(canvas.width - player.width, player.x));

            // Auto-shoot each 15 frames at higher levels
            if (gameState.level > 1 && gameState.gameTime % Math.max(5, 15 - gameState.level * 2) === 0) {
                player.shoot();
            }

            // Update bullets
            for (let i = bullets.length - 1; i >= 0; i--) {
                bullets[i].x += bullets[i].vx;
                bullets[i].y += bullets[i].vy;
                bullets[i].life--;

                if (bullets[i].y < 0 || bullets[i].life <= 0) {
                    bullets.splice(i, 1);
                }
            }

            // Update enemies
            for (let i = enemies.length - 1; i >= 0; i--) {
                enemies[i].x += enemies[i].vx;
                enemies[i].y += enemies[i].vy;

                // Bullet collision
                for (let j = bullets.length - 1; j >= 0; j--) {
                    if (Math.hypot(
                        enemies[i].x - bullets[j].x,
                        enemies[i].y - bullets[j].y
                    ) < 25) {
                        createExplosion(enemies[i].x, enemies[i].y);
                        spawnMineral(enemies[i].x, enemies[i].y);
                        gameState.score += (enemies[i].type === 'mine' ? 50 : 10) * gameState.level;
                        enemies.splice(i, 1);
                        bullets.splice(j, 1);
                        break;
                    }
                }

                // Player collision
                if (i >= 0 && Math.hypot(
                    enemies[i].x - player.x,
                    enemies[i].y - player.y
                ) < 35) {
                    const damage = enemies[i].type === 'mine' ? 30 : 10;
                    gameState.health -= damage;
                    createExplosion(player.x, player.y, 6);
                    enemies.splice(i, 1);
                }

                // Off-screen
                if (i >= 0 && enemies[i].y > canvas.height) {
                    gameState.health -= 5;
                    enemies.splice(i, 1);
                }
            }

            // Update minerals
            for (let i = minerals.length - 1; i >= 0; i--) {
                minerals[i].x += minerals[i].vx;
                minerals[i].y += minerals[i].vy;
                minerals[i].vy += 0.1;
                minerals[i].life--;

                // Player collision (pickup)
                if (Math.hypot(
                    minerals[i].x - player.x,
                    minerals[i].y - player.y
                ) < 30) {
                    gameState.score += 100;
                    minerals.splice(i, 1);
                } else if (minerals[i].life <= 0 || minerals[i].y > canvas.height) {
                    minerals.splice(i, 1);
                }
            }

            // Update particles
            for (let i = particles.length - 1; i >= 0; i--) {
                particles[i].x += particles[i].vx;
                particles[i].y += particles[i].vy;
                particles[i].life--;
                if (particles[i].life <= 0) {
                    particles.splice(i, 1);
                }
            }

            // Wave progression
            if (enemies.length === 0 && minerals.length === 0) {
                gameState.wave++;
                gameState.level = Math.floor(gameState.wave / 2) + 1;
                spawnWave();
            }

            // Game over check
            if (gameState.health <= 0) {
                gameState.running = false;
                endGame();
            }

            // Update UI
            document.getElementById('score').textContent = gameState.score;
            document.getElementById('health').textContent = gameState.health;
            document.getElementById('level').textContent = gameState.level;
            document.getElementById('waveNum').textContent = gameState.wave;
        }

        function draw() {
            ctx.fillStyle = 'rgba(10, 14, 39, 0.2)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Draw stars
            ctx.fillStyle = 'rgba(255, 255, 255, 0.1)';
            for (let i = 0; i < 20; i++) {
                const x = (gameState.gameTime * 0.2 + i * 45) % canvas.width;
                ctx.beginPath();
                ctx.arc(x, (i * 13) % canvas.height, 1, 0, Math.PI * 2);
                ctx.fill();
            }

            // Draw player
            ctx.fillStyle = '#00ff88';
            ctx.beginPath();
            ctx.moveTo(player.x + player.width / 2, player.y);
            ctx.lineTo(player.x, player.y + player.height);
            ctx.lineTo(player.x + player.width / 2, player.y + player.height - 8);
            ctx.lineTo(player.x + player.width, player.y + player.height);
            ctx.closePath();
            ctx.fill();

            // Draw bullets
            ctx.fillStyle = '#ffff00';
            bullets.forEach(b => {
                ctx.fillRect(b.x - 2, b.y - 4, 4, 8);
            });

            // Draw enemies
            enemies.forEach(e => {
                ctx.fillStyle = e.type === 'mine' ? '#ff4444' : '#ff9933';
                ctx.beginPath();
                ctx.arc(e.x, e.y, e.width / 2, 0, Math.PI * 2);
                ctx.fill();

                if (e.type === 'mine') {
                    ctx.strokeStyle = '#ff0000';
                    ctx.lineWidth = 2;
                    for (let i = 0; i < 4; i++) {
                        const angle = (i / 4) * Math.PI * 2;
                        ctx.beginPath();
                        ctx.moveTo(e.x, e.y);
                        ctx.lineTo(e.x + Math.cos(angle) * 8, e.y + Math.sin(angle) * 8);
                        ctx.stroke();
                    }
                }
            });

            // Draw minerals
            minerals.forEach(m => {
                ctx.fillStyle = `rgba(0, 255, 200, ${m.life / 300})`;
                ctx.beginPath();
                ctx.arc(m.x, m.y, 5, 0, Math.PI * 2);
                ctx.fill();
            });

            // Draw particles
            particles.forEach(p => {
                ctx.fillStyle = `rgba(255, 102, 0, ${p.life / 30})`;
                ctx.fillRect(p.x - 2, p.y - 2, 4, 4);
            });

            // Draw pause text
            if (gameState.paused) {
                ctx.fillStyle = 'rgba(0, 255, 136, 0.7)';
                ctx.font = 'bold 40px Arial';
                ctx.textAlign = 'center';
                ctx.fillText('暂停', canvas.width / 2, canvas.height / 2);
                ctx.font = '14px Arial';
                ctx.fillText('按P继续', canvas.width / 2, canvas.height / 2 + 40);
            }
        }

        function endGame() {
            document.getElementById('finalScore').textContent = gameState.score;
            document.getElementById('finalLevel').textContent = gameState.level;
            document.getElementById('gameOverModal').classList.remove('hidden');
        }

        function gameLoop() {
            update();
            draw();
            if (gameState.running || gameState.paused) {
                requestAnimationFrame(gameLoop);
            }
        }
    </script>
</body>
</html>
