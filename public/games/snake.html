<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>贪吃蛇</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      font-family: 'Arial', sans-serif;
    }

    .container {
      text-align: center;
      background: white;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 10px 50px rgba(0, 0, 0, 0.3);
    }

    h1 {
      color: #333;
      margin-bottom: 15px;
      font-size: 32px;
    }

    .info {
      display: flex;
      justify-content: space-around;
      margin-bottom: 20px;
      gap: 20px;
    }

    .score-box {
      background: #f0f0f0;
      padding: 15px 25px;
      border-radius: 5px;
      min-width: 120px;
    }

    .score-box h3 {
      color: #999;
      font-size: 12px;
      margin-bottom: 5px;
    }

    .score-box p {
      color: #333;
      font-size: 28px;
      font-weight: bold;
    }

    #gameCanvas {
      border: 3px solid #333;
      background: #000;
      display: block;
      margin: 20px auto;
      border-radius: 5px;
      cursor: pointer;
    }

    .controls {
      margin-top: 20px;
      display: flex;
      gap: 10px;
      justify-content: center;
      flex-wrap: wrap;
    }

    button {
      padding: 12px 30px;
      font-size: 16px;
      background: #667eea;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      transition: background 0.3s;
    }

    button:hover {
      background: #764ba2;
    }

    .instructions {
      margin-top: 20px;
      color: #666;
      font-size: 14px;
      text-align: left;
      background: #f9f9f9;
      padding: 15px;
      border-radius: 5px;
      max-width: 400px;
      margin-left: auto;
      margin-right: auto;
    }

    .status {
      font-size: 18px;
      color: #666;
      margin-top: 15px;
      height: 25px;
    }

    .status.game-over {
      color: #e74c3c;
      font-weight: bold;
    }

    .status.paused {
      color: #f39c12;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>贪吃蛇</h1>

    <div class="info">
      <div class="score-box">
        <h3>SCORE</h3>
        <p id="score">0</p>
      </div>
      <div class="score-box">
        <h3>BEST</h3>
        <p id="best">0</p>
      </div>
    </div>

    <canvas id="gameCanvas" width="400" height="400"></canvas>

    <div class="status" id="status"></div>

    <div class="controls">
      <button onclick="startGame()">开始</button>
      <button onclick="togglePause()">暂停/继续</button>
      <button onclick="resetGame()">重置</button>
    </div>

    <div class="instructions">
      <strong>怎么玩：</strong><br>
      • 方向键或 WASD 控制蛇移动<br>
      • 吃食物（红色方块）增长身体<br>
      • 避免撞到墙壁或自己<br>
      • 吃得越多，分数越高<br>
      • 空格暂停/继续游戏
    </div>
  </div>

  <script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    
    const gridSize = 20;
    const tileCount = canvas.width / gridSize;

    let snake = [
      { x: 10, y: 10 },
      { x: 9, y: 10 },
      { x: 8, y: 10 }
    ];
    let food = { x: 15, y: 15 };
    let direction = { x: 1, y: 0 };
    let nextDirection = { x: 1, y: 0 };
    let score = 0;
    let best = localStorage.getItem('snakeBest') || 0;
    let gameRunning = false;
    let gamePaused = false;
    let gameOverFlag = false;
    let gameLoopId = null;

    document.getElementById('best').textContent = best;

    function drawGame() {
      // 清空画布
      ctx.fillStyle = '#000';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      // 绘制食物
      ctx.fillStyle = '#ff4444';
      ctx.fillRect(food.x * gridSize, food.y * gridSize, gridSize - 1, gridSize - 1);

      // 绘制蛇头
      ctx.fillStyle = '#00ff00';
      ctx.fillRect(snake[0].x * gridSize, snake[0].y * gridSize, gridSize - 1, gridSize - 1);

      // 绘制蛇身
      ctx.fillStyle = '#00cc00';
      for (let i = 1; i < snake.length; i++) {
        ctx.fillRect(snake[i].x * gridSize, snake[i].y * gridSize, gridSize - 1, gridSize - 1);
      }

      // 绘制网格
      ctx.strokeStyle = '#333';
      ctx.lineWidth = 0.5;
      for (let i = 0; i <= tileCount; i++) {
        ctx.beginPath();
        ctx.moveTo(i * gridSize, 0);
        ctx.lineTo(i * gridSize, canvas.height);
        ctx.stroke();

        ctx.beginPath();
        ctx.moveTo(0, i * gridSize);
        ctx.lineTo(canvas.width, i * gridSize);
        ctx.stroke();
      }
    }

    function update() {
      if (!gameRunning || gamePaused || gameOverFlag) return;

      // 更新方向
      direction = nextDirection;

      // 计算新的蛇头位置
      const head = { x: snake[0].x + direction.x, y: snake[0].y + direction.y };

      // 边界检测
      if (head.x < 0 || head.x >= tileCount || head.y < 0 || head.y >= tileCount) {
        endGame();
        return;
      }

      // 自身碰撞检测
      for (let segment of snake) {
        if (segment.x === head.x && segment.y === head.y) {
          endGame();
          return;
        }
      }

      snake.unshift(head);

      // 食物检测
      if (head.x === food.x && head.y === food.y) {
        score += 10;
        document.getElementById('score').textContent = score;
        generateFood();
      } else {
        snake.pop();
      }
    }

    function generateFood() {
      let newFood;
      let valid = false;
      
      while (!valid) {
        newFood = {
          x: Math.floor(Math.random() * tileCount),
          y: Math.floor(Math.random() * tileCount)
        };
        
        valid = !snake.some(segment => segment.x === newFood.x && segment.y === newFood.y);
      }
      
      food = newFood;
    }

    function gameLoop() {
      update();
      drawGame();
    }

    function startGame() {
      if (gameRunning && !gameOverFlag) {
        return;
      }

      snake = [
        { x: 10, y: 10 },
        { x: 9, y: 10 },
        { x: 8, y: 10 }
      ];
      direction = { x: 1, y: 0 };
      nextDirection = { x: 1, y: 0 };
      score = 0;
      gameRunning = true;
      gamePaused = false;
      gameOverFlag = false;
      document.getElementById('score').textContent = score;
      document.getElementById('status').textContent = '';
      document.getElementById('status').className = '';

      generateFood();
      drawGame();

      if (gameLoopId) clearInterval(gameLoopId);
      gameLoopId = setInterval(gameLoop, 100);
    }

    function togglePause() {
      if (!gameRunning) return;
      
      gamePaused = !gamePaused;
      
      if (gamePaused) {
        document.getElementById('status').textContent = '游戏暂停 按空格继续';
        document.getElementById('status').className = 'paused';
      } else {
        document.getElementById('status').textContent = '';
        document.getElementById('status').className = '';
      }
    }

    function endGame() {
      gameRunning = false;
      gameOverFlag = true;
      document.getElementById('status').textContent = '游戏结束! 按开始重新开始';
      document.getElementById('status').className = 'game-over';

      if (score > best) {
        best = score;
        localStorage.setItem('snakeBest', best);
        document.getElementById('best').textContent = best;
      }
    }

    function resetGame() {
      gameRunning = false;
      gamePaused = false;
      gameOverFlag = false;
      if (gameLoopId) clearInterval(gameLoopId);
      snake = [
        { x: 10, y: 10 },
        { x: 9, y: 10 },
        { x: 8, y: 10 }
      ];
      score = 0;
      direction = { x: 1, y: 0 };
      nextDirection = { x: 1, y: 0 };
      document.getElementById('score').textContent = score;
      document.getElementById('status').textContent = '';
      document.getElementById('status').className = '';
      generateFood();
      drawGame();
    }

    // 键盘事件
    document.addEventListener('keydown', (e) => {
      if (!gameRunning && e.code !== 'Space') return;

      switch(e.code) {
        case 'ArrowUp':
        case 'KeyW':
          if (direction.y === 0) nextDirection = { x: 0, y: -1 };
          break;
        case 'ArrowDown':
        case 'KeyS':
          if (direction.y === 0) nextDirection = { x: 0, y: 1 };
          break;
        case 'ArrowLeft':
        case 'KeyA':
          if (direction.x === 0) nextDirection = { x: -1, y: 0 };
          break;
        case 'ArrowRight':
        case 'KeyD':
          if (direction.x === 0) nextDirection = { x: 1, y: 0 };
          break;
        case 'Space':
          if (gameRunning) {
            e.preventDefault();
            togglePause();
          }
          break;
      }
    });

    // 初始绘制
    generateFood();
    drawGame();
  </script>
</body>
</html>
