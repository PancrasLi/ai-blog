<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>节奏躲避者 - Rhythm Dodge</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Arial', sans-serif; background: linear-gradient(135deg, #1a1a2e, #16213e); display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        .game-container { background: rgba(0,0,0,0.5); border-radius: 20px; padding: 20px; box-shadow: 0 0 40px rgba(0,255,200,0.3); }
        canvas { display: block; background: linear-gradient(180deg, #0f3460, #1a1a2e); border: 3px solid #00ffc8; border-radius: 10px; box-shadow: inset 0 0 20px rgba(0,255,200,0.2); }
        .info { color: #00ffc8; text-align: center; margin-top: 15px; font-size: 14px; display: flex; justify-content: space-around; gap: 20px; }
        .info-item { flex: 1; }
        .info-value { font-size: 20px; font-weight: bold; color: #00ff88; }
        .control { color: #888; text-align: center; margin-top: 10px; font-size: 12px; }
        .game-over { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(0,0,0,0.9); color: #00ffc8; padding: 40px; border-radius: 20px; text-align: center; z-index: 1000; display: none; border: 2px solid #00ffc8; }
        .game-over h2 { font-size: 32px; margin-bottom: 20px; }
        .game-over p { font-size: 18px; margin: 10px 0; }
        .game-over button { background: #00ffc8; color: #1a1a2e; border: none; padding: 10px 30px; font-size: 16px; border-radius: 5px; cursor: pointer; margin-top: 20px; font-weight: bold; }
        .game-over button:hover { background: #00ff88; }
    </style>
</head>
<body>
    <div class="game-container">
        <canvas id="gameCanvas" width="800" height="600"></canvas>
        <div class="info">
            <div class="info-item">分数: <div class="info-value" id="score">0</div></div>
            <div class="info-item">等级: <div class="info-value" id="level">1</div></div>
            <div class="info-item">连击: <div class="info-value" id="combo">0x</div></div>
            <div class="info-item">生命: <div class="info-value" id="lives">3</div></div>
        </div>
        <div class="control">← → 方向键或 A D 移动 | 空格重新开始 (游戏结束后)</div>
    </div>
    <div class="game-over" id="gameOverScreen">
        <h2>🎮 游戏结束!</h2>
        <p id="finalScore">最终分数: 0</p>
        <p id="finalLevel">达到等级: 1</p>
        <button onclick="location.reload()">重新开始</button>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        // 游戏对象
        const game = {
            score: 0, level: 1, combo: 0, lives: 3, gameOver: false, waveCount: 0, beatTiming: 0
        };
        const player = { x: canvas.width / 2, y: canvas.height - 50, width: 30, height: 30, speed: 5 };
        const obstacles = [];
        const particles = [];
        
        // 输入处理
        const keys = { left: false, right: false, 'a': false, 'd': false };
        window.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowLeft' || e.key.toLowerCase() === 'a') keys.left = true;
            if (e.key === 'ArrowRight' || e.key.toLowerCase() === 'd') keys.right = true;
            if (e.key === ' ') e.preventDefault();
        });
        window.addEventListener('keyup', (e) => {
            if (e.key === 'ArrowLeft' || e.key.toLowerCase() === 'a') keys.left = false;
            if (e.key === 'ArrowRight' || e.key.toLowerCase() === 'd') keys.right = false;
        });

        // 绘制玩家
        function drawPlayer() {
            const gradient = ctx.createLinearGradient(player.x, player.y, player.x, player.y + player.height);
            gradient.addColorStop(0, '#00ff88');
            gradient.addColorStop(1, '#00ffc8');
            ctx.fillStyle = gradient;
            ctx.beginPath();
            ctx.moveTo(player.x + player.width / 2, player.y);
            ctx.lineTo(player.x + player.width, player.y + player.height);
            ctx.lineTo(player.x, player.y + player.height);
            ctx.closePath();
            ctx.fill();
            ctx.strokeStyle = '#00ff88';
            ctx.lineWidth = 2;
            ctx.stroke();
        }

        // 绘制障碍物
        function drawObstacles() {
            obstacles.forEach((obs, idx) => {
                if (obs.type === 'normal') {
                    ctx.fillStyle = `hsl(${obs.hue}, 100%, 50%)`;
                    ctx.fillRect(obs.x, obs.y, obs.width, obs.height);
                } else if (obs.type === 'wave') {
                    ctx.fillStyle = 'rgba(255, 100, 100, 0.8)';
                    ctx.beginPath();
                    for (let i = 0; i < obs.width; i += 5) {
                        const h = Math.sin((i + game.beatTiming) * 0.02) * 5;
                        ctx.lineTo(obs.x + i, obs.y - h);
                    }
                    ctx.lineTo(obs.x + obs.width, obs.y + obs.height);
                    ctx.lineTo(obs.x, obs.y + obs.height);
                    ctx.closePath();
                    ctx.fill();
                }
                ctx.strokeStyle = 'rgba(255,255,255,0.3)';
                ctx.lineWidth = 1;
                ctx.strokeRect(obs.x, obs.y, obs.width, obs.height);
            });
        }

        // 绘制粒子
        function drawParticles() {
            particles.forEach((p, idx) => {
                ctx.fillStyle = `rgba(${p.r}, ${p.g}, ${p.b}, ${p.alpha})`;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                ctx.fill();
            });
        }

        // 生成障碍物波浪（节奏感）
        function generateObstacles() {
            game.waveCount++;
            if (game.waveCount % 40 === 0) {
                // 波浪模式 - 多个障碍一起下落
                const positions = [80, 200, 320, 440, 560, 680];
                for (let i = 0; i < 3 + game.level; i++) {
                    const pos = positions[Math.floor(Math.random() * positions.length)];
                    obstacles.push({
                        x: pos, y: -40, width: 60, height: 40, speed: 3 + game.level * 0.5, type: 'wave', hue: 200 + Math.random() * 60
                    });
                }
            } else if (game.waveCount % 20 === 0) {
                // 普通生成
                const x = Math.random() * (canvas.width - 60);
                obstacles.push({
                    x, y: -40, width: 60, height: 30, speed: 3 + game.level * 0.5, type: 'normal', hue: Math.random() * 360
                });
            }
        }

        // 更新游戏状态
        function update() {
            if (game.gameOver) return;

            game.beatTiming++;

            // 移动玩家
            if (keys.left || keys.a) player.x = Math.max(0, player.x - player.speed);
            if (keys.right || keys.d) player.x = Math.min(canvas.width - player.width, player.x + player.speed);

            // 更新障碍物
            obstacles.forEach((obs, idx) => {
                obs.y += obs.speed;

                // 碰撞检测
                if (player.x < obs.x + obs.width && player.x + player.width > obs.x &&
                    player.y < obs.y + obs.height && player.y + player.height > obs.y) {
                    game.lives--;
                    game.combo = 0;
                    obstacles.splice(idx, 1);
                    createExplosion(player.x + player.width / 2, player.y, 'red');
                    if (game.lives <= 0) endGame();
                } else if (obs.y > canvas.height) {
                    game.score += Math.floor((100 + game.level * 20) * (1 + game.combo * 0.1));
                    game.combo++;
                    game.level = 1 + Math.floor(game.score / 500);
                    obstacles.splice(idx, 1);
                    createExplosion(obs.x + obs.width / 2, canvas.height, 'green');
                }
            });

            // 更新粒子
            particles.forEach((p, idx) => {
                p.x += p.vx;
                p.y += p.vy;
                p.vy += 0.1;
                p.alpha -= 0.02;
                if (p.alpha <= 0) particles.splice(idx, 1);
            });

            generateObstacles();
        }

        // 创建粒子爆炸
        function createExplosion(x, y, color) {
            const [r, g, b] = color === 'red' ? [255, 50, 50] : [0, 255, 136];
            for (let i = 0; i < 15; i++) {
                const angle = (Math.PI * 2 * i) / 15;
                particles.push({
                    x, y, size: 3 + Math.random() * 3,
                    vx: Math.cos(angle) * (3 + Math.random() * 3),
                    vy: Math.sin(angle) * (3 + Math.random() * 3) - 2,
                    alpha: 1, r, g, b
                });
            }
        }

        // 结束游戏
        function endGame() {
            game.gameOver = true;
            document.getElementById('gameOverScreen').style.display = 'block';
            document.getElementById('finalScore').textContent = `最终分数: ${game.score}`;
            document.getElementById('finalLevel').textContent = `达到等级: ${game.level}`;
        }

        // 主渲染循环
        function render() {
            // 清空画布
            ctx.fillStyle = 'rgba(15, 52, 96, 0.9)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // 背景网格
            ctx.strokeStyle = 'rgba(0, 255, 200, 0.1)';
            ctx.lineWidth = 1;
            for (let i = 0; i < canvas.width; i += 40) {
                ctx.beginPath();
                ctx.moveTo(i, 0);
                ctx.lineTo(i, canvas.height);
                ctx.stroke();
            }

            // 节奏条
            const beatPhase = (game.beatTiming % 40) / 40;
            ctx.fillStyle = `rgba(0, 255, 200, ${0.2 + beatPhase * 0.3})`;
            ctx.fillRect(0, canvas.height - 5, canvas.width * beatPhase, 5);

            drawParticles();
            drawObstacles();
            drawPlayer();

            // 更新UI
            document.getElementById('score').textContent = game.score;
            document.getElementById('level').textContent = game.level;
            document.getElementById('combo').textContent = game.combo + 'x';
            document.getElementById('lives').textContent = game.lives;

            update();
            requestAnimationFrame(render);
        }

        render();
    </script>
</body>
</html>
