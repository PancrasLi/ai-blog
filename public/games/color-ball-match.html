<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>彩球消消乐Plus - AI益智游戏</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Arial', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        #gameContainer {
            display: flex;
            gap: 20px;
            background: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        canvas {
            border: 3px solid #667eea;
            border-radius: 10px;
            background: linear-gradient(to bottom, #f8f9ff, #eff0ff);
            display: block;
        }
        #stats {
            width: 150px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }
        .stat-box {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            padding: 15px;
            border-radius: 10px;
            text-align: center;
        }
        .stat-label { font-size: 12px; opacity: 0.9; margin-bottom: 5px; }
        .stat-value { font-size: 28px; font-weight: bold; }
        button {
            padding: 10px;
            border: none;
            background: #667eea;
            color: white;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
            transition: 0.3s;
        }
        button:hover { background: #764ba2; transform: scale(1.05); }
        button:active { transform: scale(0.95); }
        #hint { background: #f59e0b; font-size: 12px; }
        #hint:hover { background: #d97706; }
    </style>
</head>
<body>
    <div id="gameContainer">
        <canvas id="gameCanvas" width="400" height="500"></canvas>
        <div id="stats">
            <div class="stat-box">
                <div class="stat-label">得分</div>
                <div class="stat-value" id="score">0</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">连击</div>
                <div class="stat-value" id="combo">0</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">移动</div>
                <div class="stat-value" id="moves">20</div>
            </div>
            <button id="newGame">新游戏</button>
            <button id="hint">💡 提示</button>
            <div style="background: #e5e7eb; padding: 10px; border-radius: 8px; font-size: 12px; color: #666; text-align: center;">
                <div style="margin-bottom: 8px; font-weight: bold;">游戏规则</div>
                <div>点击相邻的同色球</div>
                <div>消除3个以上</div>
                <div>获得分数</div>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        const COLS = 6, ROWS = 8;
        const BALL_RADIUS = 28;
        const COLORS = ['#FF6B6B', '#4ECDC4', '#FFE66D', '#95E1D3', '#C7CEEA', '#FF8B94'];
        
        let grid = [];
        let score = 0, combo = 0, moves = 20;
        let selected = null, matchedBalls = [];
        let gameOver = false;
        let animatingBalls = [];
        
        function initGame() {
            grid = [];
            for (let i = 0; i < ROWS; i++) {
                grid[i] = [];
                for (let j = 0; j < COLS; j++) {
                    grid[i][j] = { color: COLORS[Math.floor(Math.random() * COLORS.length)], x: j * 65 + 35, y: i * 60 + 35, falling: false };
                }
            }
            score = 0;
            combo = 0;
            moves = 20;
            selected = null;
            matchedBalls = [];
            gameOver = false;
            animatingBalls = [];
            updateUI();
            removeInitialMatches();
        }
        
        function removeInitialMatches() {
            let found = true;
            while (found) {
                found = false;
                for (let i = 0; i < ROWS; i++) {
                    for (let j = 0; j < COLS; j++) {
                        if (grid[i][j]) {
                            let matches = getMatches(i, j);
                            if (matches.length >= 3) {
                                matches.forEach(pos => grid[pos.r][pos.c] = null);
                                found = true;
                            }
                        }
                    }
                }
                if (found) dropBalls();
            }
        }
        
        function getMatches(r, c, color = null) {
            if (!grid[r] || !grid[r][c]) return [];
            color = color || grid[r][c].color;
            let matches = [];
            let visited = new Set();
            
            function dfs(row, col) {
                if (row < 0 || row >= ROWS || col < 0 || col >= COLS) return;
                if (!grid[row] || !grid[row][col]) return;
                let key = row + ',' + col;
                if (visited.has(key)) return;
                if (grid[row][col].color !== color) return;
                visited.add(key);
                matches.push({r: row, c: col});
                dfs(row-1, col); dfs(row+1, col); dfs(row, col-1); dfs(row, col+1);
            }
            dfs(r, c);
            return matches;
        }
        
        function dropBalls() {
            for (let j = 0; j < COLS; j++) {
                let balls = [];
                for (let i = ROWS - 1; i >= 0; i--) {
                    if (grid[i][j]) balls.push(grid[i][j]);
                }
                for (let i = 0; i < ROWS; i++) grid[i][j] = null;
                for (let i = ROWS - balls.length; i < ROWS; i++) {
                    grid[i][j] = balls[i - (ROWS - balls.length)];
                    grid[i][j].falling = true;
                }
            }
        }
        
        function handleClick(x, y) {
            if (gameOver) return;
            let col = Math.floor(x / 65);
            let row = Math.floor(y / 60);
            if (row < 0 || row >= ROWS || col < 0 || col >= COLS || !grid[row][col]) return;
            
            if (selected && selected.r === row && selected.c === col) {
                selected = null;
                return;
            }
            
            if (selected) {
                let dist = Math.abs(selected.r - row) + Math.abs(selected.c - col);
                if (dist !== 1) { selected = {r: row, c: col}; return; }
                
                [grid[selected.r][selected.c], grid[row][col]] = [grid[row][col], grid[selected.r][selected.c]];
                selected = null;
                moves--;
                
                let match1 = getMatches(row, col);
                let match2 = getMatches(selected.r, selected.c);
                
                if (match1.length >= 3 || match2.length >= 3) {
                    matchedBalls = [...new Set([...match1, ...match2])];
                    combo++;
                } else {
                    [grid[selected.r][selected.c], grid[row][col]] = [grid[row][col], grid[selected.r][selected.c]];
                    combo = 0;
                }
            } else {
                selected = {r: row, c: col};
            }
            updateUI();
        }
        
        function updateUI() {
            document.getElementById('score').textContent = score;
            document.getElementById('combo').textContent = combo;
            document.getElementById('moves').textContent = moves;
            if (moves <= 0) gameOver = true;
        }
        
        function draw() {
            ctx.fillStyle = '#f8f9ff';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            for (let i = 0; i < ROWS; i++) {
                for (let j = 0; j < COLS; j++) {
                    ctx.strokeStyle = '#ddd';
                    ctx.lineWidth = 1;
                    ctx.beginPath();
                    ctx.rect(j * 65, i * 60, 65, 60);
                    ctx.stroke();
                    
                    if (grid[i][j]) {
                        let ball = grid[i][j];
                        ctx.fillStyle = ball.color;
                        ctx.beginPath();
                        ctx.arc(ball.x, ball.y, BALL_RADIUS, 0, Math.PI * 2);
                        ctx.fill();
                        
                        if (selected && selected.r === i && selected.c === j) {
                            ctx.strokeStyle = '#fff';
                            ctx.lineWidth = 3;
                            ctx.beginPath();
                            ctx.arc(ball.x, ball.y, BALL_RADIUS + 5, 0, Math.PI * 2);
                            ctx.stroke();
                        }
                    }
                }
            }
            
            if (gameOver) {
                ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = '#fff';
                ctx.font = 'bold 40px Arial';
                ctx.textAlign = 'center';
                ctx.fillText('游戏结束', canvas.width / 2, canvas.height / 2 - 30);
                ctx.font = '20px Arial';
                ctx.fillText('最终得分: ' + score, canvas.width / 2, canvas.height / 2 + 30);
            }
        }
        
        function gameLoop() {
            draw();
            requestAnimationFrame(gameLoop);
        }
        
        canvas.addEventListener('click', (e) => {
            let rect = canvas.getBoundingClientRect();
            handleClick(e.clientX - rect.left, e.clientY - rect.top);
        });
        
        document.getElementById('newGame').addEventListener('click', initGame);
        document.getElementById('hint').addEventListener('click', () => {
            for (let i = 0; i < ROWS; i++) {
                for (let j = 0; j < COLS; j++) {
                    if (grid[i][j] && getMatches(i, j).length >= 3) {
                        selected = {r: i, c: j};
                        return;
                    }
                }
            }
        });
        
        initGame();
        gameLoop();
    </script>
</body>
</html>
