<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>彩色方块消除</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Microsoft YaHei', Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            padding: 20px;
            max-width: 500px;
        }
        .header {
            text-align: center;
            margin-bottom: 20px;
        }
        .title {
            font-size: 32px;
            font-weight: bold;
            color: #333;
            margin-bottom: 10px;
        }
        .stats {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 10px;
            margin-bottom: 20px;
        }
        .stat {
            background: #f0f0f0;
            padding: 10px;
            border-radius: 8px;
            text-align: center;
        }
        .stat-label {
            font-size: 12px;
            color: #666;
        }
        .stat-value {
            font-size: 24px;
            font-weight: bold;
            color: #667eea;
        }
        canvas {
            display: block;
            background: #f9f9f9;
            border: 2px solid #ddd;
            border-radius: 12px;
            cursor: pointer;
            width: 100%;
            height: auto;
        }
        .controls {
            margin-top: 20px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }
        button {
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
        }
        .btn-primary {
            background: #667eea;
            color: white;
        }
        .btn-primary:hover {
            background: #5568d3;
            transform: translateY(-2px);
        }
        .btn-secondary {
            background: #f0f0f0;
            color: #333;
        }
        .btn-secondary:hover {
            background: #e0e0e0;
        }
        .message {
            text-align: center;
            font-size: 18px;
            font-weight: bold;
            margin-top: 15px;
            min-height: 30px;
            color: #764ba2;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="title">🎮 彩色方块消除</div>
            <div class="stats">
                <div class="stat">
                    <div class="stat-label">得分</div>
                    <div class="stat-value" id="score">0</div>
                </div>
                <div class="stat">
                    <div class="stat-label">关卡</div>
                    <div class="stat-value" id="level">1</div>
                </div>
                <div class="stat">
                    <div class="stat-label">移动次数</div>
                    <div class="stat-value" id="moves">0</div>
                </div>
            </div>
        </div>
        <canvas id="gameCanvas" width="400" height="500"></canvas>
        <div class="controls">
            <button class="btn-primary" onclick="resetGame()">新游戏</button>
            <button class="btn-secondary" onclick="togglePause()">暂停</button>
        </div>
        <div class="message" id="message"></div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        const GRID_SIZE = 5;
        const BLOCK_SIZE = 70;
        const COLORS = ['#FF6B6B', '#4ECDC4', '#45B7D1', '#FFA07A', '#98D8C8', '#F7DC6F'];
        
        let grid = [];
        let score = 0;
        let level = 1;
        let moves = 0;
        let selected = null;
        let paused = false;
        
        function initGrid() {
            grid = [];
            for (let i = 0; i < GRID_SIZE; i++) {
                grid[i] = [];
                for (let j = 0; j < GRID_SIZE; j++) {
                    grid[i][j] = Math.floor(Math.random() * COLORS.length);
                }
            }
        }
        
        function drawBlock(x, y, colorIdx) {
            const px = 50 + x * BLOCK_SIZE;
            const py = 20 + y * BLOCK_SIZE;
            
            ctx.fillStyle = COLORS[colorIdx];
            ctx.fillRect(px, py, BLOCK_SIZE - 10, BLOCK_SIZE - 10);
            
            ctx.strokeStyle = '#fff';
            ctx.lineWidth = 3;
            ctx.strokeRect(px, py, BLOCK_SIZE - 10, BLOCK_SIZE - 10);
            
            if (selected && selected.x === x && selected.y === y) {
                ctx.strokeStyle = '#FFD700';
                ctx.lineWidth = 5;
                ctx.strokeRect(px - 5, py - 5, BLOCK_SIZE, BLOCK_SIZE);
            }
        }
        
        function draw() {
            ctx.fillStyle = '#f9f9f9';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            ctx.fillStyle = '#ddd';
            ctx.font = 'bold 14px Arial';
            ctx.fillText('选择两个相同颜色方块进行消除', 50, 450);
            
            if (!grid[0]) return;
            
            for (let i = 0; i < GRID_SIZE; i++) {
                for (let j = 0; j < GRID_SIZE; j++) {
                    if (grid[i] !== undefined && grid[i][j] !== undefined) {
                        drawBlock(j, i, grid[i][j]);
                    }
                }
            }
        }
        
        function removeBlock(x1, y1, x2, y2) {
            if (grid[y1][x1] === grid[y2][x2]) {
                grid[y1][x1] = -1;
                grid[y2][x2] = -1;
                dropBlocks();
                return true;
            }
            return false;
        }
        
        function dropBlocks() {
            for (let j = 0; j < GRID_SIZE; j++) {
                let dropPos = GRID_SIZE - 1;
                for (let i = GRID_SIZE - 1; i >= 0; i--) {
                    if (grid[i][j] !== -1) {
                        if (i !== dropPos) {
                            grid[dropPos][j] = grid[i][j];
                            grid[i][j] = -1;
                        }
                        dropPos--;
                    }
                }
            }
            fillEmpty();
        }
        
        function fillEmpty() {
            for (let i = 0; i < GRID_SIZE; i++) {
                for (let j = 0; j < GRID_SIZE; j++) {
                    if (grid[i][j] === -1) {
                        grid[i][j] = Math.floor(Math.random() * COLORS.length);
                    }
                }
            }
        }
        
        function handleClick(event) {
            if (paused) return;
            
            const rect = canvas.getBoundingClientRect();
            const x = Math.floor((event.clientX - rect.left - 50) / BLOCK_SIZE);
            const y = Math.floor((event.clientY - rect.top - 20) / BLOCK_SIZE);
            
            if (x < 0 || x >= GRID_SIZE || y < 0 || y >= GRID_SIZE) return;
            
            if (!selected) {
                selected = { x, y };
            } else {
                if (selected.x === x && selected.y === y) {
                    selected = null;
                } else {
                    if (removeBlock(selected.x, selected.y, x, y)) {
                        score += 100;
                        moves++;
                        level = Math.floor(moves / 5) + 1;
                        
                        if (moves % 10 === 0) {
                            document.getElementById('message').textContent = '🎉 连消奖励！得分 +200';
                            score += 200;
                            setTimeout(() => {
                                document.getElementById('message').textContent = '';
                            }, 2000);
                        }
                    } else {
                        document.getElementById('message').textContent = '❌ 颜色不匹配，重新选择';
                        setTimeout(() => {
                            document.getElementById('message').textContent = '';
                        }, 1000);
                    }
                    selected = null;
                }
            }
            updateStats();
        }
        
        function updateStats() {
            document.getElementById('score').textContent = score;
            document.getElementById('level').textContent = level;
            document.getElementById('moves').textContent = moves;
        }
        
        function resetGame() {
            score = 0;
            level = 1;
            moves = 0;
            selected = null;
            paused = false;
            initGrid();
            updateStats();
            document.getElementById('message').textContent = '游戏已重置！';
            setTimeout(() => {
                document.getElementById('message').textContent = '';
            }, 1500);
        }
        
        function togglePause() {
            paused = !paused;
            document.getElementById('message').textContent = paused ? '⏸ 游戏已暂停' : '';
        }
        
        function gameLoop() {
            draw();
            requestAnimationFrame(gameLoop);
        }
        
        canvas.addEventListener('click', handleClick);
        initGrid();
        updateStats();
        gameLoop();
    </script>
</body>
</html>
