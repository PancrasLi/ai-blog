<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>🤠 疯狂捕获 - Wild Catch</title>
<style>
body{margin:0;padding:0;display:flex;justify-content:center;align-items:center;min-height:100vh;background:#1a1a2e;font-family:"Arial",sans-serif;overflow:hidden}
canvas{border:3px solid #00d4ff;box-shadow:0 0 20px rgba(0,212,255,.5)}
#info{position:absolute;top:10px;left:10px;color:#00d4ff;font-size:16px;font-weight:bold;z-index:10;background:rgba(0,0,0,.7);padding:10px;border-radius:5px}
#score{position:absolute;top:10px;right:10px;color:#ffd700;font-size:18px;font-weight:bold;z-index:10;background:rgba(0,0,0,.7);padding:10px;border-radius:5px}
#status{position:absolute;bottom:20px;left:50%;transform:translateX(-50%);color:#00ff00;font-size:14px;background:rgba(0,0,0,.8);padding:15px 25px;border-radius:5px;text-align:center;z-index:10}
</style>
</head>
<body>
<canvas id="gameCanvas"></canvas>
<div id="info">🎮 疯狂捕获<br>🎯 按空格/点击跳跃<br>💡 捕获动物得分!</div>
<div id="score">分数: 0</div>
<div id="status">游戏开始! 🚀</div>
<script>
const canvas=document.getElementById('gameCanvas');
const ctx=canvas.getContext('2d');
canvas.width=800;
canvas.height=600;

// 游戏状态
const game={
  score:0,
  level:1,
  running:true,
  jumpPower:0,
  maxJump:15,
  gameOver:false,
  animals:[],
  obstacles:[],
  particles:[]
};

// 玩家对象
const player={
  x:150,
  y:400,
  width:40,
  height:40,
  velocityY:0,
  velocityX:5,
  jumping:false,
  color:'#FF6B9D',
  onGround:true,
  direction:1,
  frame:0,
  lasso:null
};

// 动物类型和特性
const animalTypes=[
  {emoji:'🦅',speed:3,points:10,type:'bird'},
  {emoji:'🦌',speed:2.5,points:15,type:'deer'},
  {emoji:'🐿️',speed:4,points:5,type:'squirrel'},
  {emoji:'🦝',speed:2,points:20,type:'raccoon'},
  {emoji:'🦎',speed:3.5,points:8,type:'lizard'}
];

// 创建动物
function createAnimal(){
  const type=animalTypes[Math.floor(Math.random()*animalTypes.length)];
  return{
    x:canvas.width,
    y:Math.random()*(canvas.height-100)+50,
    width:30,
    height:30,
    velocityX:-type.speed,
    emoji:type.emoji,
    points:type.points,
    caught:false,
    health:1,
    evasion:Math.random()*2+0.5
  };
}

// 创建障碍物
function createObstacle(){
  return{
    x:canvas.width,
    y:canvas.height-60,
    width:40,
    height:40,
    velocityX:-4,
    type:['rock','log','bush'][Math.floor(Math.random()*3)]
  };
}

// 套索对象
class Lasso{
  constructor(startX,startY){
    this.startX=startX;
    this.startY=startY;
    this.x=startX;
    this.y=startY;
    this.vx=12;
    this.vy=-8;
    this.active=true;
    this.life=40;
  }
  update(){
    this.x+=this.vx;
    this.y+=this.vy;
    this.vy+=0.4;
    this.life--;
    if(this.life<=0)this.active=false;
  }
  draw(){
    if(!this.active)return;
    ctx.strokeStyle='#FFD700';
    ctx.lineWidth=3;
    ctx.beginPath();
    ctx.arc(this.x,this.y,8,0,Math.PI*2);
    ctx.stroke();
    ctx.strokeStyle='rgba(255,215,0,0.5)';
    ctx.lineWidth=2;
    ctx.beginPath();
    ctx.moveTo(this.startX,this.startY);
    ctx.lineTo(this.x,this.y);
    ctx.stroke();
  }
}

// 粒子效果
class Particle{
  constructor(x,y,vx,vy,color,life){
    this.x=x;
    this.y=y;
    this.vx=vx;
    this.vy=vy;
    this.color=color;
    this.life=life;
    this.maxLife=life;
  }
  update(){
    this.x+=this.vx;
    this.y+=this.vy;
    this.vy+=0.2;
    this.life--;
  }
  draw(){
    ctx.fillStyle=this.color;
    ctx.globalAlpha=this.life/this.maxLife;
    ctx.fillRect(this.x,this.y,3,3);
    ctx.globalAlpha=1;
  }
}

// 创建爆炸粒子
function explode(x,y,emoji='✨',count=8){
  for(let i=0;i<count;i++){
    const angle=(Math.PI*2*i)/count;
    const speed=Math.random()*4+2;
    game.particles.push(new Particle(x,y,Math.cos(angle)*speed,Math.sin(angle)*speed,'#FFD700',30));
  }
}

// 输入事件
document.addEventListener('keydown',(e)=>{
  if(e.code==='Space'){
    e.preventDefault();
    if(player.onGround&&!player.jumping){
      player.jumping=true;
      player.velocityY=-15;
      player.onGround=false;
    }
    if(!player.lasso){
      player.lasso=new Lasso(player.x+player.width/2,player.y+player.height/2);
    }
  }
});

document.addEventListener('keyup',(e)=>{
  if(e.code==='Space'){
    if(player.velocityY<-5)player.velocityY=-5;
  }
});

canvas.addEventListener('click',()=>{
  if(player.onGround&&!player.jumping){
    player.jumping=true;
    player.velocityY=-15;
    player.onGround=false;
  }
  if(!player.lasso){
    player.lasso=new Lasso(player.x+player.width/2,player.y+player.height/2);
  }
});

// 更新函数
function update(){
  if(!game.running)return;

  // 玩家物理
  player.velocityY+=0.6;
  player.y+=player.velocityY;
  player.x+=player.velocityX*player.direction;

  // 边界检测
  if(player.x<0)player.x=0;
  if(player.x+player.width>canvas.width)player.x=canvas.width-player.width;

  // 地面检测
  if(player.y+player.height>=canvas.height-40){
    player.y=canvas.height-40-player.height;
    player.velocityY=0;
    player.onGround=true;
    player.jumping=false;
  }else{
    player.onGround=false;
  }

  // 套索更新和碰撞
  if(player.lasso){
    player.lasso.update();
    if(!player.lasso.active)player.lasso=null;
  }

  // 更新动物
  for(let i=game.animals.length-1;i>=0;i--){
    const animal=game.animals[i];
    animal.x+=animal.velocityX;

    // 套索碰撞检测
    if(player.lasso&&player.lasso.active){
      const dx=player.lasso.x-animal.x;
      const dy=player.lasso.y-animal.y;
      const dist=Math.sqrt(dx*dx+dy*dy);
      if(dist<25){
        game.score+=animal.points;
        document.getElementById('score').textContent=`分数: ${game.score}`;
        explode(animal.x,animal.y,animal.emoji,12);
        game.animals.splice(i,1);
        continue;
      }
    }

    // 玩家碰撞
    if(!animal.caught&&player.x<animal.x+animal.width&&player.x+player.width>animal.x&&
       player.y<animal.y+animal.height&&player.y+player.height>animal.y){
      animal.caught=true;
      game.score+=animal.points*2;
      explode(animal.x,animal.y,animal.emoji,15);
      game.animals.splice(i,1);
    }else if(animal.x<-50){
      game.animals.splice(i,1);
    }
  }

  // 更新障碍物
  for(let i=game.obstacles.length-1;i>=0;i--){
    const obs=game.obstacles[i];
    obs.x+=obs.velocityX;
    
    if(player.x<obs.x+obs.width&&player.x+player.width>obs.x&&
       player.y<obs.y+obs.height&&player.y+player.height>obs.y){
      game.gameOver=true;
      game.running=false;
    }
    if(obs.x<-50)game.obstacles.splice(i,1);
  }

  // 粒子更新
  for(let i=game.particles.length-1;i>=0;i--){
    game.particles[i].update();
    if(game.particles[i].life<=0)game.particles.splice(i,1);
  }

  // 生成敌人
  if(Math.random()<0.02)game.animals.push(createAnimal());
  if(Math.random()<0.01)game.obstacles.push(createObstacle());

  // 难度提升
  if(game.score>0&&game.score%100===0){
    game.level=Math.floor(game.score/100)+1;
  }

  document.getElementById('info').textContent=`🎮 疯狂捕获\n🎯 按空格/点击跳跃\n📊 等级: ${game.level}`;
}

// 绘制函数
function draw(){
  // 背景
  const gradient=ctx.createLinearGradient(0,0,0,canvas.height);
  gradient.addColorStop(0,'#16213e');
  gradient.addColorStop(1,'#0f3460');
  ctx.fillStyle=gradient;
  ctx.fillRect(0,0,canvas.width,canvas.height);

  // 地面
  ctx.fillStyle='#2d5016';
  ctx.fillRect(0,canvas.height-40,canvas.width,40);
  ctx.strokeStyle='#4a9d3e';
  ctx.lineWidth=2;
  for(let i=0;i<canvas.width;i+=40){
    ctx.beginPath();
    ctx.moveTo(i,canvas.height-40);
    ctx.lineTo(i+20,canvas.height-30);
    ctx.stroke();
  }

  // 玩家 - 牛仔
  ctx.save();
  ctx.translate(player.x+player.width/2,player.y+player.height/2);
  if(player.direction===-1)ctx.scale(-1,1);
  
  // 身体
  ctx.fillStyle=player.color;
  ctx.fillRect(-15,-15,30,20);
  
  // 头
  ctx.fillStyle='#FFB6C1';
  ctx.beginPath();
  ctx.arc(0,-15,10,0,Math.PI*2);
  ctx.fill();
  
  // 眼睛
  ctx.fillStyle='#000';
  ctx.fillRect(-4,-17,2,3);
  ctx.fillRect(2,-17,2,3);
  
  // 帽子
  ctx.fillStyle='#8B4513';
  ctx.beginPath();
  ctx.moveTo(-12,-25);
  ctx.lineTo(12,-25);
  ctx.lineTo(10,-18);
  ctx.lineTo(-10,-18);
  ctx.closePath();
  ctx.fill();
  
  ctx.restore();

  // 套索
  if(player.lasso)player.lasso.draw();

  // 动物
  game.animals.forEach(animal=>{
    ctx.font='24px Arial';
    ctx.textAlign='center';
    ctx.textBaseline='middle';
    ctx.fillText(animal.emoji,animal.x+animal.width/2,animal.y+animal.height/2);
  });

  // 障碍物
  game.obstacles.forEach(obs=>{
    ctx.fillStyle='#8B4513';
    if(obs.type==='rock'){
      ctx.fillRect(obs.x,obs.y,obs.width,obs.height);
      ctx.strokeStyle='#654321';
      ctx.lineWidth=2;
      ctx.strokeRect(obs.x,obs.y,obs.width,obs.height);
    }else if(obs.type==='log'){
      ctx.fillRect(obs.x,obs.y,obs.width,obs.height);
    }else{
      ctx.beginPath();
      ctx.arc(obs.x+obs.width/2,obs.y+obs.height/2,obs.width/2,0,Math.PI*2);
      ctx.fill();
    }
  });

  // 粒子
  game.particles.forEach(p=>p.draw());

  // 游戏结束
  if(game.gameOver){
    ctx.fillStyle='rgba(0,0,0,0.7)';
    ctx.fillRect(0,0,canvas.width,canvas.height);
    ctx.fillStyle='#FF6B9D';
    ctx.font='bold 48px Arial';
    ctx.textAlign='center';
    ctx.fillText('游戏结束!',canvas.width/2,canvas.height/2-50);
    ctx.font='32px Arial';
    ctx.fillStyle='#FFD700';
    ctx.fillText(`最终分数: ${game.score}`,canvas.width/2,canvas.height/2+30);
    ctx.fillStyle='#00d4ff';
    ctx.font='20px Arial';
    ctx.fillText('按F5刷新重新开始',canvas.width/2,canvas.height/2+80);
    document.getElementById('status').textContent='游戏结束! 按F5重新开始';
  }
}

// 游戏循环
function gameLoop(){
  update();
  draw();
  requestAnimationFrame(gameLoop);
}

gameLoop();

// 防止误操作
window.addEventListener('load',()=>{
  document.getElementById('status').textContent='✅ 游戏已加载! 按空格或点击开始';
});
</script>
</body>
</html>
