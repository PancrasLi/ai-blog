<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>迷宫逃脱冒险 - Maze Escape Rush</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Arial', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        #gameContainer {
            position: relative;
            background: #000;
            border: 3px solid #fff;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }
        canvas { display: block; }
        #ui {
            position: absolute;
            top: 0; left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 20px;
        }
        .topUI {
            display: flex;
            justify-content: space-between;
            color: #fff;
            font-weight: bold;
            font-size: 18px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.7);
        }
        .levelInfo { color: #4fc3f7; }
        .timeInfo { color: #ffc107; }
        .bottomUI {
            text-align: center;
            color: #fff;
            font-size: 16px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.7);
        }
        #gameOver {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.9);
            padding: 30px;
            border-radius: 10px;
            text-align: center;
            color: #fff;
            display: none;
            z-index: 100;
            pointer-events: auto;
        }
        .gameOverTitle { font-size: 28px; margin: 10px 0; }
        .gameOverText { font-size: 18px; margin: 10px 0; }
        .restartBtn {
            margin-top: 20px;
            padding: 10px 20px;
            background: #4fc3f7;
            color: #000;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }
        .restartBtn:hover { background: #29b6f6; }
    </style>
</head>
<body>
    <div id="gameContainer">
        <canvas id="gameCanvas" width="800" height="600"></canvas>
        <div id="ui">
            <div class="topUI">
                <div class="levelInfo">第 <span id="level">1</span> 关</div>
                <div class="timeInfo">时间: <span id="timer">60</span>s</div>
            </div>
            <div class="bottomUI">
                <div>方向键/WASD移动 | 空格冲刺 | 找到出口逃脱！</div>
            </div>
        </div>
        <div id="gameOver">
            <div class="gameOverTitle" id="resultTitle">关卡完成！</div>
            <div class="gameOverText">完成时间: <span id="completedTime">0</span>s</div>
            <div class="gameOverText" id="levelMessage"></div>
            <button class="restartBtn" onclick="location.reload()">重新开始</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        let level = 1;
        let gameTime = 60;
        let timeLeft = gameTime;
        let gameActive = true;
        let levelComplete = false;
        let startTime = 0;
        
        class Player {
            constructor(x, y) {
                this.x = x; this.y = y;
                this.w = 20; this.h = 20;
                this.vx = 0; this.vy = 0;
                this.speed = 3;
                this.boostSpeed = 5;
                this.boosting = false;
            }
            update(keys) {
                this.vx = 0; this.vy = 0;
                if (keys['ArrowLeft'] || keys['w']) this.vx = -this.speed;
                if (keys['ArrowRight'] || keys['d']) this.vx = this.speed;
                if (keys['ArrowUp'] || keys['w']) this.vy = -this.speed;
                if (keys['ArrowDown'] || keys['s']) this.vy = this.speed;
                if (keys[' ']) {
                    this.speed = this.boostSpeed;
                } else {
                    this.speed = 3;
                }
                
                this.x += this.vx;
                this.y += this.vy;
                
                // Boundary
                this.x = Math.max(0, Math.min(canvas.width - this.w, this.x));
                this.y = Math.max(0, Math.min(canvas.height - this.h, this.y));
            }
            draw() {
                ctx.fillStyle = '#4fc3f7';
                ctx.fillRect(this.x, this.y, this.w, this.h);
                ctx.strokeStyle = '#fff';
                ctx.lineWidth = 2;
                ctx.strokeRect(this.x, this.y, this.w, this.h);
            }
        }
        
        class Wall {
            constructor(x, y, w, h) {
                this.x = x; this.y = y; this.w = w; this.h = h;
            }
            draw() {
                ctx.fillStyle = '#666';
                ctx.fillRect(this.x, this.y, this.w, this.h);
                ctx.strokeStyle = '#999';
                ctx.lineWidth = 2;
                ctx.strokeRect(this.x, this.y, this.w, this.h);
            }
            collides(obj) {
                return obj.x < this.x + this.w && obj.x + obj.w > this.x &&
                       obj.y < this.y + this.h && obj.y + obj.h > this.y;
            }
        }
        
        class Enemy {
            constructor(x, y, w, h) {
                this.x = x; this.y = y; this.w = w; this.h = h;
                this.vx = 1; this.vy = 0;
                this.speed = 1.5;
            }
            update() {
                this.x += this.vx * this.speed;
                if (this.x <= 0 || this.x + this.w >= canvas.width) this.vx *= -1;
            }
            draw() {
                ctx.fillStyle = '#ff6b6b';
                ctx.fillRect(this.x, this.y, this.w, this.h);
                ctx.fillStyle = '#000';
                ctx.fillRect(this.x + 5, this.y + 5, 5, 5);
                ctx.fillRect(this.x + this.w - 10, this.y + 5, 5, 5);
            }
            collides(obj) {
                return obj.x < this.x + this.w && obj.x + obj.w > this.x &&
                       obj.y < this.y + this.h && obj.y + obj.h > this.y;
            }
        }
        
        class Exit {
            constructor(x, y) {
                this.x = x; this.y = y;
                this.w = 30; this.h = 30;
                this.pulse = 0;
            }
            update() {
                this.pulse += 0.1;
            }
            draw() {
                const size = 30 + Math.sin(this.pulse) * 5;
                ctx.fillStyle = '#00ff00';
                ctx.globalAlpha = 0.3 + Math.sin(this.pulse) * 0.2;
                ctx.fillRect(this.x - size/2 + 15, this.y - size/2 + 15, size, size);
                ctx.globalAlpha = 1;
                ctx.strokeStyle = '#00ff00';
                ctx.lineWidth = 3;
                ctx.strokeRect(this.x, this.y, this.w, this.h);
                ctx.fillStyle = '#00ff00';
                ctx.font = 'bold 16px Arial';
                ctx.textAlign = 'center';
                ctx.fillText('EXIT', this.x + 15, this.y + 20);
            }
            collides(obj) {
                return obj.x < this.x + this.w && obj.x + obj.w > this.x &&
                       obj.y < this.y + this.h && obj.y + obj.h > this.y;
            }
        }
        
        function generateMaze(lvl) {
            let maze = [];
            let enemies = [];
            
            // Level layouts
            if (lvl === 1) {
                maze = [
                    new Wall(100, 50, 200, 20),
                    new Wall(100, 50, 20, 200),
                    new Wall(280, 50, 20, 200),
                    new Wall(400, 150, 200, 20),
                    new Wall(400, 150, 20, 250),
                    new Wall(200, 350, 200, 20),
                ];
                enemies = [new Enemy(150, 400, 30, 20)];
            } else if (lvl === 2) {
                maze = [
                    new Wall(50, 100, 150, 20), new Wall(50, 100, 20, 200),
                    new Wall(300, 200, 150, 20), new Wall(300, 200, 20, 200),
                    new Wall(600, 50, 20, 350), new Wall(150, 450, 300, 20),
                ];
                enemies = [new Enemy(100, 300, 25, 25), new Enemy(400, 150, 25, 25)];
            } else if (lvl === 3) {
                maze = [
                    new Wall(80, 100, 200, 20), new Wall(80, 100, 20, 300),
                    new Wall(400, 50, 20, 350), new Wall(300, 350, 250, 20),
                    new Wall(150, 200, 150, 20), new Wall(550, 200, 20, 150),
                ];
                enemies = [new Enemy(120, 250, 20, 20), new Enemy(350, 300, 20, 20), new Enemy(600, 400, 20, 20)];
            } else {
                maze = [
                    new Wall(Math.random() * 300, Math.random() * 300, Math.random() * 200 + 100, 20),
                    new Wall(Math.random() * 300, Math.random() * 300, 20, Math.random() * 200 + 100),
                ];
                enemies = [];
                for (let i = 0; i < lvl; i++) {
                    enemies.push(new Enemy(Math.random() * 700, Math.random() * 550, 20, 20));
                }
            }
            
            return { maze, enemies };
        }
        
        let player = new Player(30, 30);
        let exit = new Exit(750, 550);
        let { maze, enemies } = generateMaze(level);
        
        const keys = {};
        window.addEventListener('keydown', (e) => keys[e.key] = true);
        window.addEventListener('keyup', (e) => keys[e.key] = false);
        
        function checkCollisions() {
            for (let wall of maze) {
                if (wall.collides(player)) {
                    player.x -= player.vx;
                    player.y -= player.vy;
                    break;
                }
            }
            
            for (let enemy of enemies) {
                if (enemy.collides(player)) {
                    gameActive = false;
                    levelComplete = false;
                    document.getElementById('resultTitle').textContent = '💥 游戏结束！';
                    document.getElementById('levelMessage').textContent = '被守卫抓住了...';
                    document.getElementById('gameOver').style.display = 'block';
                }
            }
            
            if (exit.collides(player) && gameActive) {
                gameActive = false;
                levelComplete = true;
                const finishedTime = gameTime - timeLeft;
                document.getElementById('completedTime').textContent = finishedTime;
                document.getElementById('resultTitle').textContent = '🎉 关卡完成！';
                document.getElementById('levelMessage').textContent = `用时 ${finishedTime} 秒完成第 ${level} 关，准备进入下一关...`;
                document.getElementById('gameOver').style.display = 'block';
                setTimeout(() => {
                    level++;
                    if (level > 5) {
                        alert('🏆 游戏通关！所有关卡已完成！');
                        location.reload();
                    } else {
                        location.reload();
                    }
                }, 2000);
            }
        }
        
        let lastTime = Date.now();
        function update() {
            const now = Date.now();
            const deltaTime = (now - lastTime) / 1000;
            lastTime = now;
            
            if (gameActive) {
                timeLeft -= deltaTime;
                document.getElementById('timer').textContent = Math.max(0, Math.ceil(timeLeft));
                
                if (timeLeft <= 0) {
                    gameActive = false;
                    document.getElementById('resultTitle').textContent = '⏰ 时间到！';
                    document.getElementById('levelMessage').textContent = '未能在规定时间内逃脱...';
                    document.getElementById('gameOver').style.display = 'block';
                }
            }
            
            player.update(keys);
            exit.update();
            for (let enemy of enemies) enemy.update();
            checkCollisions();
        }
        
        function draw() {
            ctx.fillStyle = '#1a1a1a';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            for (let wall of maze) wall.draw();
            for (let enemy of enemies) enemy.draw();
            exit.draw();
            player.draw();
        }
        
        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }
        
        document.getElementById('level').textContent = level;
        gameLoop();
    </script>
</body>
</html>
