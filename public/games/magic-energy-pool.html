<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>魔法能量池 - Magic Energy Pool</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Arial', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
        #container { text-align: center; }
        #gameCanvas { border: 4px solid #fff; background: linear-gradient(180deg, #1a1a2e 0%, #16213e 100%); display: block; margin: 20px auto; box-shadow: 0 0 30px rgba(0,0,0,0.5); }
        #ui { color: #fff; font-size: 18px; margin: 10px 0; }
        .stat { display: inline-block; margin: 0 20px; font-weight: bold; }
        #level { color: #ffd700; }
        #score { color: #00ff00; }
        #time { color: #ff6b6b; }
        #status { font-size: 16px; margin-top: 10px; min-height: 25px; }
        button { padding: 10px 30px; margin: 10px 5px; font-size: 16px; background: #667eea; color: #fff; border: none; border-radius: 5px; cursor: pointer; }
        button:hover { background: #764ba2; }
    </style>
</head>
<body>
    <div id="container">
        <h1 style="color: #fff; margin-bottom: 20px;">✨ 魔法能量池 ✨</h1>
        <canvas id="gameCanvas" width="800" height="600"></canvas>
        <div id="ui">
            <div class="stat">关卡: <span id="level">1</span></div>
            <div class="stat">得分: <span id="score">0</span></div>
            <div class="stat">时间: <span id="time">60</span>s</div>
        </div>
        <div id="status"></div>
        <button onclick="game.restart()">🔄 重新开始</button>
        <button onclick="game.togglePause()">⏸️ <span id="pauseBtn">暂停</span></button>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const COLORS = ['#FF6B6B', '#4ECDC4', '#FFE66D', '#95E1D3', '#C7CEEA', '#FF8B94'];
        const GRID_W = 8, GRID_H = 10;
        const CELL_SIZE = Math.min(canvas.width / GRID_W, canvas.height / GRID_H);
        const OFFSET_X = (canvas.width - GRID_W * CELL_SIZE) / 2;
        const OFFSET_Y = (canvas.height - GRID_H * CELL_SIZE) / 2;

        class Particle {
            constructor(x, y, color) { this.x = x; this.y = y; this.color = color; this.vx = 0; this.vy = 0; this.alive = true; }
            update() { this.vy += 0.2; this.x += this.vx; this.y += this.vy; if (this.y > canvas.height) this.alive = false; }
            draw() { ctx.fillStyle = this.color; ctx.fillRect(this.x - 5, this.y - 5, 10, 10); }
        }

        const game = {
            grid: [],
            particles: [],
            score: 0,
            level: 1,
            timeLeft: 60,
            gameOver: false,
            paused: false,
            startTime: 0,
            lastUpdateTime: 0,

            init() {
                this.score = 0; this.level = 1; this.timeLeft = 60; this.gameOver = false; this.paused = false;
                this.grid = Array(GRID_H).fill().map(() => Array(GRID_W).fill().map(() => COLORS[Math.floor(Math.random() * COLORS.length)]));
                this.particles = [];
                this.startTime = Date.now();
                this.lastUpdateTime = this.startTime;
                canvas.onclick = (e) => this.handleClick(e);
            },

            handleClick(e) {
                if (this.gameOver || this.paused) return;
                const rect = canvas.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                const col = Math.floor((x - OFFSET_X) / CELL_SIZE);
                const row = Math.floor((y - OFFSET_Y) / CELL_SIZE);
                if (col >= 0 && col < GRID_W && row >= 0 && row < GRID_H) {
                    const color = this.grid[row][col];
                    const toRemove = new Set([`${row},${col}`]);
                    const stack = [[row, col]];
                    while (stack.length) {
                        const [r, c] = stack.pop();
                        for (const [dr, dc] of [[0,1],[0,-1],[1,0],[-1,0]]) {
                            const nr = r + dr, nc = c + dc;
                            if (nr >= 0 && nr < GRID_H && nc >= 0 && nc < GRID_W && this.grid[nr][nc] === color && !toRemove.has(`${nr},${nc}`)) {
                                toRemove.add(`${nr},${nc}`);
                                stack.push([nr, nc]);
                            }
                        }
                    }
                    if (toRemove.size > 1) {
                        toRemove.forEach(key => {
                            const [r, c] = key.split(',').map(Number);
                            const px = OFFSET_X + c * CELL_SIZE + CELL_SIZE / 2;
                            const py = OFFSET_Y + r * CELL_SIZE + CELL_SIZE / 2;
                            for (let i = 0; i < 5; i++) {
                                const p = new Particle(px, py, color);
                                p.vx = (Math.random() - 0.5) * 4;
                                p.vy = (Math.random() - 0.5) * 4;
                                this.particles.push(p);
                            }
                            this.grid[r][c] = null;
                        });
                        this.score += toRemove.size * (10 + this.level * 5);
                        if (this.score % 500 === 0) { this.level++; }
                        this.dropAndFill();
                    }
                }
            },

            dropAndFill() {
                for (let c = 0; c < GRID_W; c++) {
                    const column = [];
                    for (let r = 0; r < GRID_H; r++) {
                        if (this.grid[r][c] !== null) column.push(this.grid[r][c]);
                    }
                    for (let r = 0; r < GRID_H; r++) {
                        this.grid[r][c] = column[r - (GRID_H - column.length)] || null;
                    }
                }
                for (let r = 0; r < GRID_H; r++) {
                    for (let c = 0; c < GRID_W; c++) {
                        if (this.grid[r][c] === null) {
                            this.grid[r][c] = COLORS[Math.floor(Math.random() * COLORS.length)];
                        }
                    }
                }
            },

            update() {
                if (this.gameOver || this.paused) return;
                const now = Date.now();
                this.timeLeft = Math.max(0, 60 - Math.floor((now - this.startTime) / 1000));
                if (this.timeLeft === 0) { this.gameOver = true; document.getElementById('status').textContent = `⏱️ 时间到！最终得分: ${this.score}`; }
                this.particles.forEach(p => { p.update(); });
                this.particles = this.particles.filter(p => p.alive);
            },

            draw() {
                ctx.fillStyle = 'rgba(26, 26, 46, 0.8)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                for (let r = 0; r < GRID_H; r++) {
                    for (let c = 0; c < GRID_W; c++) {
                        const x = OFFSET_X + c * CELL_SIZE;
                        const y = OFFSET_Y + r * CELL_SIZE;
                        ctx.strokeStyle = 'rgba(255, 255, 255, 0.2)';
                        ctx.lineWidth = 1;
                        ctx.strokeRect(x, y, CELL_SIZE, CELL_SIZE);
                        if (this.grid[r][c]) {
                            ctx.fillStyle = this.grid[r][c];
                            ctx.beginPath();
                            ctx.arc(x + CELL_SIZE / 2, y + CELL_SIZE / 2, CELL_SIZE / 2.5, 0, Math.PI * 2);
                            ctx.fill();
                        }
                    }
                }
                this.particles.forEach(p => p.draw());
                document.getElementById('score').textContent = this.score;
                document.getElementById('level').textContent = this.level;
                document.getElementById('time').textContent = this.timeLeft;
            },

            togglePause() { this.paused = !this.paused; document.getElementById('pauseBtn').textContent = this.paused ? '继续' : '暂停'; },

            restart() { this.init(); this.startGame(); }
        };

        function gameLoop() {
            game.update();
            game.draw();
            requestAnimationFrame(gameLoop);
        }

        game.init();
        gameLoop();
    </script>
</body>
</html>
