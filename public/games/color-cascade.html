<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>彩色坠落 - Color Cascade</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            width: 100%;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: 'Arial', sans-serif;
            overflow: hidden;
        }
        #gameContainer {
            position: relative;
            width: 400px;
            height: 600px;
            background: #1a1a2e;
            border: 3px solid #00d4ff;
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.5);
            border-radius: 10px;
            overflow: hidden;
        }
        #gameCanvas {
            display: block;
            width: 100%;
            height: 100%;
        }
        #ui {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            padding: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(0, 0, 0, 0.5);
            color: #00d4ff;
            font-size: 14px;
            z-index: 10;
        }
        .info { display: flex; gap: 20px; }
    </style>
</head>
<body>
    <div id="gameContainer">
        <canvas id="gameCanvas" width="400" height="600"></canvas>
        <div id="ui">
            <div class="info">
                <div>得分: <span id="score">0</span></div>
                <div>关卡: <span id="level">1</span></div>
            </div>
            <div id="gameState">准备开始...</div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const GRID_WIDTH = 6;
        const GRID_HEIGHT = 10;
        const CELL_SIZE = canvas.width / GRID_WIDTH;
        const COLORS = ['#FF6B6B', '#4ECDC4', '#FFE66D', '#95E1D3', '#F38181', '#AA96DA'];

        let grid = [];
        let score = 0;
        let level = 1;
        let gameActive = true;
        let nextPiece = null;
        let falling = null;
        let gameState = '准备开始...';

        // 初始化网格
        function initGrid() {
            grid = Array(GRID_HEIGHT).fill(null).map(() => Array(GRID_WIDTH).fill(null));
        }

        // 块的定义
        class Block {
            constructor(x, y, color) {
                this.x = x;
                this.y = y;
                this.color = color;
            }
        }

        // 生成新的下落块
        function spawnNewBlock() {
            const x = Math.floor(GRID_WIDTH / 2) - 1;
            const color = COLORS[Math.floor(Math.random() * COLORS.length)];
            falling = new Block(x, 0, color);
            nextPiece = COLORS[Math.floor(Math.random() * COLORS.length)];
            gameState = '下落中...';
        }

        // 检查位置是否有效
        function isValidPosition(x, y) {
            return x >= 0 && x < GRID_WIDTH && y >= 0 && y < GRID_HEIGHT;
        }

        // 检查位置是否可放置
        function canPlace(x, y) {
            if (!isValidPosition(x, y)) return false;
            return grid[y][x] === null;
        }

        // 放置块
        function placeBlock() {
            if (falling && canPlace(falling.x, falling.y)) {
                grid[falling.y][falling.x] = falling;
                checkMatches();
                spawnNewBlock();
                if (!canPlace(falling.x, falling.y)) {
                    gameState = '游戏结束!';
                    gameActive = false;
                }
            }
        }

        // 检查并消除匹配
        function checkMatches() {
            let matched = [];
            
            // 水平检查
            for (let y = 0; y < GRID_HEIGHT; y++) {
                for (let x = 0; x < GRID_WIDTH - 2; x++) {
                    if (grid[y][x] && grid[y][x+1] && grid[y][x+2]) {
                        if (grid[y][x].color === grid[y][x+1].color && 
                            grid[y][x].color === grid[y][x+2].color) {
                            matched.push([y, x], [y, x+1], [y, x+2]);
                        }
                    }
                }
            }
            
            // 垂直检查
            for (let x = 0; x < GRID_WIDTH; x++) {
                for (let y = 0; y < GRID_HEIGHT - 2; y++) {
                    if (grid[y][x] && grid[y+1][x] && grid[y+2][x]) {
                        if (grid[y][x].color === grid[y+1][x].color && 
                            grid[y][x].color === grid[y+2][x].color) {
                            matched.push([y, x], [y+1, x], [y+2, x]);
                        }
                    }
                }
            }
            
            // 移除重复并删除
            matched = [...new Set(matched.map(m => m.join(',')))].map(m => m.split(',').map(Number));
            matched.forEach(([y, x]) => {
                grid[y][x] = null;
                score += 10 * level;
            });
            
            if (matched.length > 0) {
                applyGravity();
                checkMatches();
            }
        }

        // 应用重力
        function applyGravity() {
            for (let x = 0; x < GRID_WIDTH; x++) {
                for (let y = GRID_HEIGHT - 1; y >= 0; y--) {
                    if (grid[y][x] === null) {
                        for (let y2 = y - 1; y2 >= 0; y2--) {
                            if (grid[y2][x] !== null) {
                                grid[y][x] = grid[y2][x];
                                grid[y2][x] = null;
                                break;
                            }
                        }
                    }
                }
            }
        }

        // 绘制
        function draw() {
            ctx.fillStyle = '#1a1a2e';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // 绘制网格线
            ctx.strokeStyle = '#333';
            ctx.lineWidth = 1;
            for (let i = 0; i <= GRID_WIDTH; i++) {
                ctx.beginPath();
                ctx.moveTo(i * CELL_SIZE, 0);
                ctx.lineTo(i * CELL_SIZE, canvas.height);
                ctx.stroke();
            }
            for (let i = 0; i <= GRID_HEIGHT; i++) {
                ctx.beginPath();
                ctx.moveTo(0, i * CELL_SIZE);
                ctx.lineTo(canvas.width, i * CELL_SIZE);
                ctx.stroke();
            }
            
            // 绘制已放置的块
            for (let y = 0; y < GRID_HEIGHT; y++) {
                for (let x = 0; x < GRID_WIDTH; x++) {
                    if (grid[y][x]) {
                        ctx.fillStyle = grid[y][x].color;
                        ctx.fillRect(x * CELL_SIZE + 2, y * CELL_SIZE + 2, CELL_SIZE - 4, CELL_SIZE - 4);
                        ctx.strokeStyle = '#fff';
                        ctx.lineWidth = 2;
                        ctx.strokeRect(x * CELL_SIZE + 2, y * CELL_SIZE + 2, CELL_SIZE - 4, CELL_SIZE - 4);
                    }
                }
            }
            
            // 绘制下落块
            if (falling) {
                ctx.fillStyle = falling.color;
                ctx.globalAlpha = 0.8;
                ctx.fillRect(falling.x * CELL_SIZE + 2, falling.y * CELL_SIZE + 2, CELL_SIZE - 4, CELL_SIZE - 4);
                ctx.globalAlpha = 1;
                ctx.strokeStyle = '#fff';
                ctx.lineWidth = 2;
                ctx.strokeRect(falling.x * CELL_SIZE + 2, falling.y * CELL_SIZE + 2, CELL_SIZE - 4, CELL_SIZE - 4);
            }
            
            // 绘制提示
            ctx.fillStyle = '#fff';
            ctx.font = '12px Arial';
            ctx.fillText('方向键移动，空格下落', 10, canvas.height - 10);
        }

        // 游戏循环
        let lastFallTime = 0;
        function gameLoop(currentTime) {
            if (lastFallTime === 0) lastFallTime = currentTime;
            
            if (gameActive) {
                const fallDelay = Math.max(200, 800 - level * 50);
                if (currentTime - lastFallTime > fallDelay) {
                    if (falling && canPlace(falling.x, falling.y + 1)) {
                        falling.y++;
                    } else if (falling) {
                        placeBlock();
                    }
                    lastFallTime = currentTime;
                }
            }
            
            draw();
            
            document.getElementById('score').textContent = score;
            document.getElementById('level').textContent = level;
            document.getElementById('gameState').textContent = gameState;
            
            // 更新关卡
            level = Math.floor(score / 100) + 1;
            
            requestAnimationFrame(gameLoop);
        }

        // 键盘控制
        document.addEventListener('keydown', (e) => {
            if (!gameActive) {
                if (e.key === ' ') {
                    score = 0;
                    level = 1;
                    initGrid();
                    gameActive = true;
                    lastFallTime = 0;
                    spawnNewBlock();
                }
                return;
            }
            
            if (falling) {
                if (e.key === 'ArrowLeft' && canPlace(falling.x - 1, falling.y)) {
                    falling.x--;
                }
                if (e.key === 'ArrowRight' && canPlace(falling.x + 1, falling.y)) {
                    falling.x++;
                }
                if (e.key === ' ') {
                    while (canPlace(falling.x, falling.y + 1)) {
                        falling.y++;
                    }
                    placeBlock();
                }
            }
        });

        // 初始化游戏
        initGrid();
        spawnNewBlock();
        requestAnimationFrame(gameLoop);
    </script>
</body>
</html>
