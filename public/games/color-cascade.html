<!DOCTYPE html>
<html lang="zh-CN">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>彩球瀑布消除</title><style>body{margin:0;padding:20px;display:flex;justify-content:center;align-items:center;min-height:100vh;background:#1a1a1a;font-family:Arial,sans-serif}canvas{border:3px solid #00ffff;background:#0a0a0a;display:block;cursor:crosshair}#info{position:absolute;top:20px;right:20px;color:#fff;background:rgba(0,0,0,.8);padding:15px;border-radius:5px}#score{font-size:20px;color:#00ffff;margin-bottom:5px}#level{font-size:14px;color:#888}</style></head><body><canvas id="game" width="400" height="600"></canvas><div id="info"><div id="score">分数: 0</div><div id="level">关卡: 1</div></div><script>const canvas=document.getElementById('game'),ctx=canvas.getContext('2d'),COLS=5,ROWS=8,CELL=40,COLORS=['#FF6B6B','#4ECDC4','#45B7D1','#FFA07A','#98D8C8'],game={balls:[],score:0,level:1,combo:0,gravity:0.3,friction:0.99};function Ball(x,y,color){this.x=x,this.y=y,this.color=color,this.vx=0,this.vy=0,this.radius=CELL/2-2,this.falling=!1,this.connected=[]}function createInitialBalls(){game.balls=[];for(let r=0;r<6;r++)for(let c=0;c<COLS;c++)game.balls.push(new Ball(c*CELL+CELL/2,r*CELL+CELL/2,COLORS[Math.floor(Math.random()*COLORS.length)]))}function drawGame(){ctx.fillStyle='#0a0a0a',ctx.fillRect(0,0,canvas.width,canvas.height);for(let i=0;i<COLS;i++)ctx.strokeStyle='#222',ctx.beginPath(),ctx.moveTo(i*CELL,0),ctx.lineTo(i*CELL,canvas.height),ctx.stroke();game.balls.forEach(ball=>{ctx.fillStyle=ball.color,ctx.beginPath(),ctx.arc(ball.x,ball.y,ball.radius,0,Math.PI*2),ctx.fill(),game.combo>1&&(ctx.strokeStyle='#FFD700',ctx.lineWidth=2,ctx.stroke())})}function updatePhysics(){game.balls.forEach(ball=>{ball.falling&&(ball.vy+=game.gravity,ball.vy*=game.friction,ball.y+=ball.vy);let collided=!1;for(let i=0;i<COLS;i++)if(ball.x>i*CELL&&ball.x<(i+1)*CELL){if(ball.y+ball.radius>=canvas.height){ball.y=canvas.height-ball.radius,ball.vy=0,collided=!0;break}}game.balls.forEach(other=>{if(ball!==other){let dx=other.x-ball.x,dy=other.y-ball.y,dist=Math.sqrt(dx*dx+dy*dy),minDist=ball.radius+other.radius;dist<minDist&&(ball.falling||other.falling)&&(ball.vy*=-0.5,ball.y-=(minDist-dist)/2)}})})}function detectMatches(){let matched=[];function markConnected(ball,visited){visited.has(ball)||(visited.add(ball),ball.connected.push(ball),game.balls.forEach(other=>{if(!visited.has(other)&&other.color===ball.color){let dx=other.x-ball.x,dy=other.y-ball.y,dist=Math.sqrt(dx*dx+dy*dy);dist<ball.radius*3&&markConnected(other,visited)}}))}game.balls.forEach(ball=>{if(!matched.includes(ball)&&ball.connected.length<3){ball.connected=[],markConnected(ball,new Set(ball.connected)),ball.connected.length>=3&&(matched.push(...ball.connected),game.score+=ball.connected.length*10*(1+game.combo),game.combo++)}}),matched.length>0&&(game.balls=game.balls.filter(b=>!matched.includes(b)),game.combo=0,setTimeout(detectMatches,200))}function handleClick(e){let rect=canvas.getBoundingClientRect(),x=e.clientX-rect.left,y=e.clientY-rect.top,col=Math.floor(x/CELL);if(col<0||col>=COLS)return;let newBall=new Ball(col*CELL+CELL/2,0,COLORS[Math.floor(Math.random()*COLORS.length)]);newBall.falling=!0,game.balls.push(newBall),setTimeout(detectMatches,300)}function update(){updatePhysics(),game.balls.length>ROWS*COLS&&(game.level++,game.score+=1e3,createInitialBalls())}function gameLoop(){drawGame(),update(),document.getElementById('score').textContent='分数: '+game.score,document.getElementById('level').textContent='关卡: '+game.level,requestAnimationFrame(gameLoop)}createInitialBalls(),canvas.addEventListener('click',handleClick),gameLoop()</script></body></html>
