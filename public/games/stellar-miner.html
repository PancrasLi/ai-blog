<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>星际矿工 - Stellar Miner 2026</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            background: #000;
            font-family: Arial, sans-serif;
        }
        #gameContainer {
            position: relative;
            width: 800px;
            height: 600px;
            border: 3px solid #0ff;
            box-shadow: 0 0 20px #0ff;
        }
        canvas { display: block; }
        #ui {
            position: absolute;
            top: 10px;
            left: 10px;
            color: #0ff;
            font-size: 14px;
            z-index: 10;
        }
        #gameOver {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.95);
            padding: 30px;
            border: 3px solid #0ff;
            color: #0ff;
            text-align: center;
            z-index: 20;
            display: none;
        }
        .restart-btn {
            margin-top: 20px;
            padding: 10px 20px;
            background: #0ff;
            color: #000;
            border: none;
            cursor: pointer;
            font-weight: bold;
            font-size: 16px;
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <canvas id="gameCanvas" width="800" height="600"></canvas>
        <div id="ui">
            <div>💎 矿产: <span id="ore">0</span></div>
            <div>⚡ 等级: <span id="level">1</span></div>
            <div>⏱️ 生命: <span id="health">100</span></div>
            <div>📊 得分: <span id="score">0</span></div>
        </div>
        <div id="gameOver">
            <h2>游戏结束！</h2>
            <p>最终得分: <span id="finalScore">0</span></p>
            <button class="restart-btn" onclick="location.reload()">重新开始</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        // 游戏状态
        const game = {
            ore: 0,
            level: 1,
            health: 100,
            maxHealth: 100,
            score: 0,
            gameOver: false,
            time: 0
        };

        // 玩家
        const player = {
            x: 400,
            y: 500,
            w: 30,
            h: 30,
            vx: 0,
            speed: 5,
            radius: 15
        };

        // 矿物数组
        let minerals = [];
        let asteroids = [];
        let particles = [];

        // 键盘输入
        const keys = {};
        window.addEventListener('keydown', (e) => {
            keys[e.key] = true;
        });
        window.addEventListener('keyup', (e) => {
            keys[e.key] = false;
        });

        // 鼠标移动
        document.addEventListener('mousemove', (e) => {
            const rect = canvas.getBoundingClientRect();
            player.x = e.clientX - rect.left;
        });

        // 生成矿物
        function spawnMineral() {
            if (Math.random() < 0.02 * (1 + game.level * 0.1)) {
                minerals.push({
                    x: Math.random() * canvas.width,
                    y: -20,
                    vy: 2 + game.level * 0.3,
                    radius: 8,
                    type: Math.random() > 0.7 ? 'gold' : 'silver'
                });
            }
        }

        // 生成陨石
        function spawnAsteroid() {
            if (Math.random() < 0.01 * (1 + game.level * 0.15)) {
                asteroids.push({
                    x: Math.random() * canvas.width,
                    y: -20,
                    vy: 2.5 + game.level * 0.4,
                    radius: 15,
                    rotation: 0,
                    rotSpeed: Math.random() - 0.5
                });
            }
        }

        // 创建粒子
        function createParticles(x, y, color, count) {
            for (let i = 0; i < count; i++) {
                particles.push({
                    x: x,
                    y: y,
                    vx: (Math.random() - 0.5) * 8,
                    vy: (Math.random() - 0.5) * 8,
                    life: 30,
                    color: color
                });
            }
        }

        // 检查碰撞
        function checkCollision(x1, y1, r1, x2, y2, r2) {
            const dx = x2 - x1;
            const dy = y2 - y1;
            const dist = Math.sqrt(dx * dx + dy * dy);
            return dist < r1 + r2;
        }

        // 更新
        function update() {
            game.time++;

            // 玩家移动
            if (keys['ArrowLeft'] || keys['a']) {
                player.x = Math.max(player.radius, player.x - player.speed);
            }
            if (keys['ArrowRight'] || keys['d']) {
                player.x = Math.min(canvas.width - player.radius, player.x + player.speed);
            }

            // 更新矿物
            for (let i = minerals.length - 1; i >= 0; i--) {
                minerals[i].y += minerals[i].vy;
                
                if (checkCollision(player.x, player.y, player.radius, minerals[i].x, minerals[i].y, minerals[i].radius)) {
                    const value = minerals[i].type === 'gold' ? 10 : 5;
                    game.ore += value;
                    game.score += value;
                    createParticles(minerals[i].x, minerals[i].y, minerals[i].type === 'gold' ? '#FFD700' : '#C0C0C0', 8);
                    minerals.splice(i, 1);
                } else if (minerals[i].y > canvas.height) {
                    minerals.splice(i, 1);
                }
            }

            // 更新陨石
            for (let i = asteroids.length - 1; i >= 0; i--) {
                asteroids[i].y += asteroids[i].vy;
                asteroids[i].rotation += asteroids[i].rotSpeed;
                
                if (checkCollision(player.x, player.y, player.radius, asteroids[i].x, asteroids[i].y, asteroids[i].radius)) {
                    game.health -= 10;
                    createParticles(asteroids[i].x, asteroids[i].y, '#FF4444', 10);
                    asteroids.splice(i, 1);
                } else if (asteroids[i].y > canvas.height) {
                    asteroids.splice(i, 1);
                }
            }

            // 更新粒子
            for (let i = particles.length - 1; i >= 0; i--) {
                particles[i].x += particles[i].vx;
                particles[i].y += particles[i].vy;
                particles[i].life--;
                particles[i].vy += 0.2; // 重力
                if (particles[i].life <= 0) {
                    particles.splice(i, 1);
                }
            }

            // 升级逻辑
            const nextLevelOre = game.level * 50;
            if (game.ore >= nextLevelOre) {
                game.level++;
                game.ore = 0;
                game.maxHealth = 100 + game.level * 10;
                game.health = game.maxHealth;
            }

            // 检查游戏结束
            if (game.health <= 0) {
                game.gameOver = true;
                document.getElementById('gameOver').style.display = 'block';
                document.getElementById('finalScore').textContent = game.score;
            }

            // 生成新的矿物和陨石
            spawnMineral();
            spawnAsteroid();

            // 更新UI
            document.getElementById('ore').textContent = game.ore;
            document.getElementById('level').textContent = game.level;
            document.getElementById('health').textContent = Math.max(0, game.health);
            document.getElementById('score').textContent = game.score;
        }

        // 绘制
        function draw() {
            // 背景
            ctx.fillStyle = '#001a33';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // 星空效果
            ctx.fillStyle = '#fff';
            for (let i = 0; i < 50; i++) {
                const x = (game.time * 0.5 + i * 100) % canvas.width;
                const y = (i * 50) % canvas.height;
                ctx.fillRect(x, y, 2, 2);
            }

            // 矿物
            minerals.forEach(m => {
                ctx.fillStyle = m.type === 'gold' ? '#FFD700' : '#C0C0C0';
                ctx.beginPath();
                ctx.arc(m.x, m.y, m.radius, 0, Math.PI * 2);
                ctx.fill();
                ctx.strokeStyle = '#fff';
                ctx.lineWidth = 1;
                ctx.stroke();
            });

            // 陨石
            asteroids.forEach(a => {
                ctx.save();
                ctx.translate(a.x, a.y);
                ctx.rotate(a.rotation);
                ctx.fillStyle = '#884444';
                ctx.beginPath();
                ctx.arc(0, 0, a.radius, 0, Math.PI * 2);
                ctx.fill();
                ctx.strokeStyle = '#FF6666';
                ctx.lineWidth = 2;
                ctx.stroke();
                ctx.restore();
            });

            // 粒子
            particles.forEach(p => {
                ctx.globalAlpha = p.life / 30;
                ctx.fillStyle = p.color;
                ctx.beginPath();
                ctx.arc(p.x, p.y, 3, 0, Math.PI * 2);
                ctx.fill();
                ctx.globalAlpha = 1;
            });

            // 玩家
            ctx.fillStyle = '#00FF00';
            ctx.beginPath();
            ctx.arc(player.x, player.y, player.radius, 0, Math.PI * 2);
            ctx.fill();
            
            // 玩家发光
            ctx.strokeStyle = '#00FF00';
            ctx.lineWidth = 2;
            ctx.stroke();

            // 生命条
            ctx.fillStyle = '#FF4444';
            ctx.fillRect(player.x - player.radius, player.y - player.radius - 15, (game.health / game.maxHealth) * 30, 5);
            ctx.strokeStyle = '#00FF00';
            ctx.lineWidth = 1;
            ctx.strokeRect(player.x - player.radius, player.y - player.radius - 15, 30, 5);
        }

        // 游戏循环
        function gameLoop() {
            if (!game.gameOver) {
                update();
            }
            draw();
            requestAnimationFrame(gameLoop);
        }

        gameLoop();
    </script>
</body>
</html>
