<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>闪电捕手 - Flash Catch</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: 'Arial', sans-serif;
        }
        #gameContainer {
            position: relative;
            width: 800px;
            height: 600px;
            background: linear-gradient(180deg, #1e3c72 0%, #2a5298 100%);
            border: 4px solid #ffd700;
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.5);
            cursor: crosshair;
        }
        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }
        #ui {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }
        .score-board {
            position: absolute;
            top: 20px;
            left: 20px;
            color: #fff;
            font-size: 24px;
            font-weight: bold;
            z-index: 10;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.7);
        }
        .timer {
            position: absolute;
            top: 20px;
            right: 20px;
            color: #ff6b6b;
            font-size: 32px;
            font-weight: bold;
            z-index: 10;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.7);
        }
        .combo {
            position: absolute;
            top: 70px;
            left: 20px;
            color: #ffd700;
            font-size: 18px;
            font-weight: bold;
            z-index: 10;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.7);
        }
        .gameOver {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.9);
            padding: 40px 60px;
            border-radius: 20px;
            text-align: center;
            z-index: 100;
            display: none;
            pointer-events: auto;
        }
        .gameOver h1 {
            color: #ff6b6b;
            font-size: 48px;
            margin-bottom: 20px;
        }
        .gameOver p {
            color: #fff;
            font-size: 24px;
            margin-bottom: 10px;
        }
        .gameOver button {
            background: #667eea;
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 20px;
            border-radius: 10px;
            cursor: pointer;
            margin-top: 20px;
            transition: background 0.3s;
        }
        .gameOver button:hover {
            background: #764ba2;
        }
        .start-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(180deg, rgba(30, 60, 114, 0.95), rgba(42, 82, 152, 0.95));
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 200;
            pointer-events: auto;
        }
        .start-screen h1 {
            color: #ffd700;
            font-size: 64px;
            margin-bottom: 20px;
            text-shadow: 3px 3px 6px rgba(0, 0, 0, 0.8);
        }
        .start-screen p {
            color: #fff;
            font-size: 20px;
            margin-bottom: 30px;
            text-align: center;
            max-width: 500px;
        }
        .start-screen button {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            padding: 20px 50px;
            font-size: 24px;
            border-radius: 15px;
            cursor: pointer;
            margin-top: 20px;
            transition: transform 0.3s;
        }
        .start-screen button:hover {
            transform: scale(1.05);
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <canvas id="gameCanvas"></canvas>
        <div id="ui">
            <div class="score-board">分数: <span id="score">0</span></div>
            <div class="timer" id="timer">30</div>
            <div class="combo">连击: <span id="combo">0</span></div>
            <div class="gameOver" id="gameOver">
                <h1>游戏结束!</h1>
                <p>最终分数: <span id="finalScore">0</span></p>
                <p>最高连击: <span id="maxCombo">0</span></p>
                <button onclick="location.reload()">再来一局</button>
            </div>
            <div class="start-screen" id="startScreen">
                <h1>⚡ 闪电捕手 ⚡</h1>
                <p>点击闪烁的目标赚取积分<br>30秒内能得多少分？</p>
                <button onclick="startGame()">开始游戏</button>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        // 设置canvas尺寸
        canvas.width = 800;
        canvas.height = 600;
        
        // 游戏变量
        let gameState = 'start'; // start, playing, gameover
        let score = 0;
        let combo = 0;
        let maxCombo = 0;
        let timeLeft = 30;
        let gameStartTime = 0;
        let targets = [];
        let particles = [];
        let clickCounter = 0;

        // 目标对象
        class Target {
            constructor() {
                this.x = Math.random() * (canvas.width - 60) + 30;
                this.y = Math.random() * (canvas.height - 60) + 30;
                this.size = 40;
                this.opacity = 0;
                this.flashSpeed = 0.08 + Math.random() * 0.04;
                this.color = `hsl(${Math.random() * 360}, 100%, 50%)`;
                this.lifespan = 2000 + Math.random() * 1000; // ms
                this.createdTime = Date.now();
            }

            update() {
                const elapsed = Date.now() - this.createdTime;
                if (elapsed > this.lifespan) return false;
                
                // 闪烁效果
                this.opacity = Math.abs(Math.sin(elapsed * this.flashSpeed / 1000)) * 0.8 + 0.2;
                return true;
            }

            draw() {
                ctx.save();
                ctx.globalAlpha = this.opacity;
                
                // 绘制目标
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
                
                // 外圆环
                ctx.strokeStyle = '#fff';
                ctx.lineWidth = 3;
                ctx.stroke();
                
                // 中心点
                ctx.fillStyle = '#fff';
                ctx.beginPath();
                ctx.arc(this.x, this.y, 8, 0, Math.PI * 2);
                ctx.fill();
                
                ctx.restore();
            }

            isHit(mx, my) {
                const dx = mx - this.x;
                const dy = my - this.y;
                return Math.sqrt(dx * dx + dy * dy) < this.size + 10;
            }
        }

        // 粒子效果
        class Particle {
            constructor(x, y, color) {
                this.x = x;
                this.y = y;
                this.color = color;
                this.vx = (Math.random() - 0.5) * 8;
                this.vy = (Math.random() - 0.5) * 8 - 2;
                this.size = 8 + Math.random() * 4;
                this.life = 1;
            }

            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.vy += 0.2; // 重力
                this.life -= 0.02;
            }

            draw() {
                ctx.save();
                ctx.globalAlpha = this.life;
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size * this.life, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            }
        }

        // 游戏更新
        function update() {
            if (gameState !== 'playing') return;

            // 更新时间
            timeLeft = 30 - Math.floor((Date.now() - gameStartTime) / 1000);
            if (timeLeft <= 0) {
                endGame();
                return;
            }

            // 生成新目标
            if (Math.random() < 0.03 && targets.length < 5) {
                targets.push(new Target());
            }

            // 更新目标
            targets = targets.filter(t => t.update());

            // 更新粒子
            particles.forEach(p => p.update());
            particles = particles.filter(p => p.life > 0);

            // 自动减少连击
            if (clickCounter++ > 60) {
                combo = 0;
                clickCounter = 0;
            }
        }

        // 绘制
        function draw() {
            // 背景
            ctx.fillStyle = '#1e3c72';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // 网格背景
            ctx.strokeStyle = 'rgba(255, 215, 0, 0.05)';
            ctx.lineWidth = 1;
            for (let i = 0; i < canvas.width; i += 50) {
                ctx.beginPath();
                ctx.moveTo(i, 0);
                ctx.lineTo(i, canvas.height);
                ctx.stroke();
            }
            for (let i = 0; i < canvas.height; i += 50) {
                ctx.beginPath();
                ctx.moveTo(0, i);
                ctx.lineTo(canvas.width, i);
                ctx.stroke();
            }

            // 绘制目标
            targets.forEach(t => t.draw());

            // 绘制粒子
            particles.forEach(p => p.draw());

            // 更新UI
            document.getElementById('score').textContent = score;
            document.getElementById('combo').textContent = combo;
            document.getElementById('timer').textContent = timeLeft;
        }

        // 游戏循环
        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }

        // 鼠标点击事件
        document.getElementById('gameContainer').addEventListener('click', function(e) {
            if (gameState !== 'playing') return;

            const rect = canvas.getBoundingClientRect();
            const mx = e.clientX - rect.left;
            const my = e.clientY - rect.top;

            let hit = false;
            for (let i = targets.length - 1; i >= 0; i--) {
                if (targets[i].isHit(mx, my)) {
                    score += 10 + combo * 2;
                    combo++;
                    if (combo > maxCombo) maxCombo = combo;
                    clickCounter = 0;

                    // 创建粒子
                    for (let j = 0; j < 12; j++) {
                        particles.push(new Particle(mx, my, targets[i].color));
                    }

                    targets.splice(i, 1);
                    hit = true;
                    break;
                }
            }

            if (!hit) {
                combo = 0;
                clickCounter = 0;
            }
        });

        // 开始游戏
        function startGame() {
            document.getElementById('startScreen').style.display = 'none';
            gameState = 'playing';
            gameStartTime = Date.now();
            score = 0;
            combo = 0;
            maxCombo = 0;
            targets = [];
            particles = [];
        }

        // 结束游戏
        function endGame() {
            gameState = 'gameover';
            document.getElementById('finalScore').textContent = score;
            document.getElementById('maxCombo').textContent = maxCombo;
            document.getElementById('gameOver').style.display = 'block';
        }

        // 启动游戏循环
        gameLoop();
    </script>
</body>
</html>
