<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>🎨 彩色几何跳 - Color Jump</title>
<style>
body{margin:0;padding:0;display:flex;justify-content:center;align-items:center;min-height:100vh;background:#0a0e27;font-family:"Arial",sans-serif;overflow:hidden}
canvas{border:3px solid #00ff88;box-shadow:0 0 25px rgba(0,255,136,.6)}
#ui{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:5}
.score{position:absolute;top:20px;right:20px;color:#00ff88;font-size:24px;font-weight:bold;background:rgba(0,0,0,.7);padding:15px;border-radius:8px}
.combo{position:absolute;top:60px;right:20px;color:#ffaa00;font-size:18px;font-weight:bold;background:rgba(0,0,0,.7);padding:10px;border-radius:8px}
#start{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);color:#00ff88;font-size:32px;font-weight:bold;text-align:center;background:rgba(0,0,0,.9);padding:40px;border-radius:15px;cursor:pointer}
#gameOver{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);color:#ff4444;font-size:36px;text-align:center;background:rgba(0,0,0,.95);padding:40px;border-radius:15px;display:none;z-index:20}
</style>
</head>
<body>
<canvas id="gameCanvas"></canvas>
<div id="ui">
  <div class="score">分数: <span id="scoreVal">0</span></div>
  <div class="combo">连击: <span id="comboVal">0</span></div>
  <div id="start">🎮 彩色几何跳<br><br>点击或按空格开始<br><br>⬆️ 跳过色块<br>🟦 相同颜色=连击加倍</div>
  <div id="gameOver"></div>
</div>
<script>
const canvas=document.getElementById('gameCanvas');
const ctx=canvas.getContext('2d');
canvas.width=800;
canvas.height=600;

const game={
  started:false,
  score:0,
  combo:0,
  gameOver:false,
  blocks:[],
  particles:[],
  player:{x:400,y:500,size:25,velocityY:0,falling:true,color:'#00ff88'},
  currentColor:'#ff0055'
};

const colors=['#ff0055','#00ff88','#ffaa00','#0099ff','#ff00ff','#00ffff','#ffff00'];

class Block{
  constructor(x,y,width,height,color){
    this.x=x;
    this.y=y;
    this.width=width;
    this.height=height;
    this.color=color;
    this.passed=false;
  }
  draw(){
    ctx.fillStyle=this.color;
    ctx.fillRect(this.x,this.y,this.width,this.height);
    ctx.strokeStyle='rgba(255,255,255,0.3)';
    ctx.lineWidth=2;
    ctx.strokeRect(this.x,this.y,this.width,this.height);
  }
}

class Particle{
  constructor(x,y,vx,vy,color){
    this.x=x;
    this.y=y;
    this.vx=vx;
    this.vy=vy;
    this.color=color;
    this.life=20;
  }
  update(){
    this.x+=this.vx;
    this.y+=this.vy;
    this.vy+=0.3;
    this.life--;
  }
  draw(){
    ctx.fillStyle=this.color;
    ctx.globalAlpha=this.life/20;
    ctx.fillRect(this.x,this.y,5,5);
    ctx.globalAlpha=1;
  }
}

function generateBlocks(){
  const blockWidth=canvas.width/4;
  const blockHeight=80;
  let y=canvas.height;
  let color=colors[Math.floor(Math.random()*colors.length)];
  
  while(y>-blockHeight){
    const gap=Math.random()>0.5?2:1;
    const blocks=[];
    
    for(let i=0;i<4;i++){
      if(gap===1||i!==Math.floor(Math.random()*4)){
        blocks.push(new Block(i*blockWidth,y,blockWidth-2,blockHeight,color));
      }
    }
    
    game.blocks.push(...blocks);
    y-=blockHeight+40;
    color=colors[Math.floor(Math.random()*colors.length)];
  }
}

function start(){
  if(game.started)return;
  game.started=true;
  game.score=0;
  game.combo=0;
  game.gameOver=false;
  game.blocks=[];
  game.particles=[];
  game.player={x:400,y:500,size:25,velocityY:0,falling:true,color:'#00ff88'};
  generateBlocks();
  document.getElementById('start').style.display='none';
  document.getElementById('gameOver').style.display='none';
}

function jump(){
  if(!game.started)return;
  if(game.player.velocityY===0||game.player.y>=580){
    game.player.velocityY=-14;
  }
}

document.addEventListener('keydown',(e)=>{
  if(e.code==='Space'){
    e.preventDefault();
    if(!game.started)start();
    else jump();
  }
});

document.addEventListener('click',()=>{
  if(!game.started)start();
  else jump();
});

canvas.addEventListener('click',(e)=>{
  if(!game.started)start();
  else jump();
});

function update(){
  if(!game.started||game.gameOver)return;

  // 玩家物理
  game.player.velocityY+=0.5;
  game.player.y+=game.player.velocityY;

  // 地面检测
  if(game.player.y>=580){
    game.player.y=580;
    game.player.velocityY=0;
  }

  // 块碰撞检测
  for(let i=game.blocks.length-1;i>=0;i--){
    const block=game.blocks[i];
    
    // 顶部碰撞（踩踏）
    if(game.player.velocityY>0&&
       game.player.y+game.player.size>=block.y&&
       game.player.y+game.player.size<=block.y+block.height+10&&
       game.player.x+game.player.size>block.x&&
       game.player.x<block.x+block.width){
      
      game.player.velocityY=-12;
      
      // 同色奖励
      if(block.color===game.currentColor){
        game.combo++;
        game.score+=game.combo*10;
        for(let j=0;j<5;j++){
          const angle=(Math.PI*2*j)/5;
          game.particles.push(new Particle(
            game.player.x,game.player.y,
            Math.cos(angle)*3,Math.sin(angle)*3,
            block.color
          ));
        }
      }else{
        game.combo=1;
        game.score+=10;
        game.currentColor=block.color;
      }
      
      document.getElementById('scoreVal').textContent=game.score;
      document.getElementById('comboVal').textContent=game.combo;
    }
    
    // 底部碰撞（死亡）
    if(game.player.velocityY<0&&
       game.player.y<block.y+block.height&&
       game.player.y+game.player.size>block.y&&
       game.player.x+game.player.size>block.x&&
       game.player.x<block.x+block.width){
      game.gameOver=true;
    }
    
    // 移出屏幕删除
    if(block.y>canvas.height)game.blocks.splice(i,1);
  }

  // 游戏结束检查
  if(game.player.y>canvas.height){
    game.gameOver=true;
  }

  // 粒子更新
  for(let i=game.particles.length-1;i>=0;i--){
    game.particles[i].update();
    if(game.particles[i].life<=0)game.particles.splice(i,1);
  }

  // 镜头跟随
  if(game.player.y<canvas.height/3){
    const diff=game.player.y-(canvas.height/3);
    game.blocks.forEach(b=>b.y-=diff);
    game.player.y=canvas.height/3;
    
    // 生成新块
    if(game.blocks[game.blocks.length-1].y>0){
      generateBlocks();
    }
  }

  // 显示游戏结束
  if(game.gameOver){
    document.getElementById('gameOver').style.display='block';
    document.getElementById('gameOver').innerHTML=`
      <div style="font-size:48px;color:#ff4444;margin-bottom:20px">💀 游戏结束</div>
      <div style="font-size:28px;color:#ffff00;margin-bottom:20px">分数: ${game.score}</div>
      <div style="font-size:20px;color:#00ff88;margin-bottom:20px">最高连击: ${game.combo}</div>
      <div style="font-size:18px;color:#0099ff;cursor:pointer" onclick="location.reload()">按F5或点击重新开始</div>
    `;
  }
}

function draw(){
  // 背景渐变
  const gradient=ctx.createLinearGradient(0,0,0,canvas.height);
  gradient.addColorStop(0,'#0a0e27');
  gradient.addColorStop(1,'#1a0033');
  ctx.fillStyle=gradient;
  ctx.fillRect(0,0,canvas.width,canvas.height);

  // 网格背景
  ctx.strokeStyle='rgba(0,255,136,0.05)';
  ctx.lineWidth=1;
  for(let i=0;i<canvas.width;i+=40){
    ctx.beginPath();
    ctx.moveTo(i,0);
    ctx.lineTo(i,canvas.height);
    ctx.stroke();
  }
  for(let i=0;i<canvas.height;i+=40){
    ctx.beginPath();
    ctx.moveTo(0,i);
    ctx.lineTo(canvas.width,i);
    ctx.stroke();
  }

  // 块
  game.blocks.forEach(block=>block.draw());

  // 玩家
  ctx.fillStyle=game.player.color;
  ctx.beginPath();
  ctx.arc(game.player.x,game.player.y,game.player.size,0,Math.PI*2);
  ctx.fill();
  ctx.strokeStyle='rgba(255,255,255,0.5)';
  ctx.lineWidth=2;
  ctx.stroke();

  // 玩家眼睛
  ctx.fillStyle='#fff';
  ctx.fillRect(game.player.x-8,game.player.y-8,5,5);
  ctx.fillRect(game.player.x+3,game.player.y-8,5,5);

  // 粒子
  game.particles.forEach(p=>p.draw());
}

function gameLoop(){
  update();
  draw();
  requestAnimationFrame(gameLoop);
}

document.getElementById('start').style.display='block';
gameLoop();
</script>
</body>
</html>
