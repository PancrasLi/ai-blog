<!DOCTYPE html><html><head><meta charset="UTF-8"><title>元素碰撞者</title><style>body{margin:0;overflow:hidden;background:#000;font-family:Arial}canvas{display:block}</style></head><body><canvas id="game"></canvas><script>const canvas=document.getElementById('game');const ctx=canvas.getContext('2d');canvas.width=800;canvas.height=600;class Game{constructor(){this.player={x:400,y:300,r:15,vx:0,vy:0,maxSpeed:6};this.balls=[];this.particles=[];this.score=0;this.level=1;this.life=100;this.wave=0;this.waveMax=3;this.gameOver=false;this.startWave()}startWave(){this.wave++;this.waveMax=Math.min(5,this.level);let count=Math.min(5+this.level,12);for(let i=0;i<count;i++){let angle=Math.random()*Math.PI*2;let dist=Math.random()*150+200;let x=400+Math.cos(angle)*dist;let y=300+Math.sin(angle)*dist;let type=Math.floor(Math.random()*3);let vx=(400-x)/150*5;let vy=(300-y)/150*5;this.balls.push({x,y,vx,vy,r:8,type,life:1})}}update(){if(this.gameOver)return;this.player.x+=this.player.vx;this.player.y+=this.player.vy;this.player.x=Math.max(20,Math.min(780,this.player.x));this.player.y=Math.max(20,Math.min(580,this.player.y));for(let i=this.balls.length-1;i>=0;i--){let b=this.balls[i];b.x+=b.vx;b.y+=b.vy;let dx=b.x-this.player.x;let dy=b.y-this.player.y;let d=Math.sqrt(dx*dx+dy*dy);if(d<this.player.r+b.r){let hitType=Math.floor(Math.random()*100);if(hitType%2===b.type){this.score+=100*(1+Math.floor(this.level/2));for(let j=0;j<12;j++){let angle=Math.random()*Math.PI*2;let vx=Math.cos(angle)*8;let vy=Math.sin(angle)*8;this.particles.push({x:b.x,y:b.y,vx,vy,life:30,color:['#FF6B6B','#4ECDC4','#FFE66D'][b.type]})}}else{this.life-=20;for(let j=0;j<8;j++){let angle=Math.random()*Math.PI*2;let vx=Math.cos(angle)*4;let vy=Math.sin(angle)*4;this.particles.push({x:b.x,y:b.y,vx,vy,life:20,color:'#999'})}}this.balls.splice(i,1)}if(b.x<-50||b.x>850||b.y<-50||b.y>650){this.balls.splice(i,1)}}for(let i=this.particles.length-1;i>=0;i--){let p=this.particles[i];p.x+=p.vx;p.y+=p.vy;p.life--;if(p.life<=0)this.particles.splice(i,1)}if(this.balls.length===0&&this.wave<this.waveMax){this.startWave()}if(this.life<=0){this.gameOver=true}if(this.balls.length===0&&this.wave===this.waveMax){this.level++;this.waveMax=0;this.wave=0;this.startWave()}}draw(){ctx.fillStyle='#000';ctx.fillRect(0,0,800,600);ctx.fillStyle='#1a1a2e';ctx.fillRect(50,50,700,500);let gradient=ctx.createRadialGradient(400,300,100,400,300,300);gradient.addColorStop(0,'#16213e');gradient.addColorStop(1,'#0f3460');ctx.fillStyle=gradient;ctx.fillRect(50,50,700,500);ctx.shadowColor='rgba(255,255,255,0.5)';ctx.shadowBlur=20;ctx.fillStyle=['#FF6B6B','#4ECDC4','#FFE66D'][this.balls.length%3];ctx.beginPath();ctx.arc(this.player.x,this.player.y,this.player.r,0,Math.PI*2);ctx.fill();for(let b of this.balls){ctx.fillStyle=['#FF6B6B','#4ECDC4','#FFE66D'][b.type];ctx.beginPath();ctx.arc(b.x,b.y,b.r,0,Math.PI*2);ctx.fill()}for(let p of this.particles){ctx.globalAlpha=p.life/30;ctx.fillStyle=p.color;ctx.beginPath();ctx.arc(p.x,p.y,3,0,Math.PI*2);ctx.fill()}ctx.globalAlpha=1;ctx.shadowColor='none';ctx.fillStyle='#FFF';ctx.font='20px Arial';ctx.fillText('分数: '+this.score,70,600);ctx.fillText('生命: '+Math.max(0,this.life),300,600);ctx.fillText('关卡: '+this.level,550,600);if(this.gameOver){ctx.fillStyle='rgba(0,0,0,0.7)';ctx.fillRect(0,0,800,600);ctx.fillStyle='#FFF';ctx.font='bold 50px Arial';ctx.textAlign='center';ctx.fillText('GAME OVER',400,250);ctx.font='30px Arial';ctx.fillText('最终分数: '+this.score,400,320);ctx.fillText('按Space重新开始',400,380);ctx.textAlign='left'}}handleInput(key){let speed=6;if(key==='ArrowUp'||key==='w'||key==='W')this.player.vy=-speed;else if(key==='ArrowDown'||key==='s'||key==='S')this.player.vy=speed;else if(key==='ArrowLeft'||key==='a'||key==='A')this.player.vx=-speed;else if(key==='ArrowRight'||key==='d'||key==='D')this.player.vx=speed}reset(){this.player={x:400,y:300,r:15,vx:0,vy:0,maxSpeed:6};this.balls=[];this.particles=[];this.score=0;this.level=1;this.life=100;this.wave=0;this.waveMax=0;this.gameOver=false;this.startWave()}}const game=new Game();const keys={};window.addEventListener('keydown',e=>{keys[e.key]=true;if(e.key===' '&&game.gameOver){game.reset()}});window.addEventListener('keyup',e=>{keys[e.key]=false});function gameLoop(){game.update();game.draw();if(keys['ArrowUp']||keys['w']||keys['W'])game.player.vy=-6;if(keys['ArrowDown']||keys['s']||keys['S'])game.player.vy=6;if(keys['ArrowLeft']||keys['a']||keys['A'])game.player.vx=-6;if(keys['ArrowRight']||keys['d']||keys['D'])game.player.vx=6;requestAnimationFrame(gameLoop)}gameLoop();</script></body></html>
