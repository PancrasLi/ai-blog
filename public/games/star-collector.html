<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>星球收集者 - Star Collector</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{display:flex;justify-content:center;align-items:center;min-height:100vh;background:#001a33;font-family:Arial,sans-serif;color:#fff}
        #game-container{text-align:center}
        canvas{display:block;background:#0a1929;border:3px solid #00d4ff;cursor:pointer;margin:20px auto;image-rendering:pixelated}
        #info{font-size:18px;margin:10px 0;text-shadow:0 0 10px #00d4ff}
        #score{color:#ffd700}
        #level{color:#00ff88}
        button{padding:8px 16px;margin:5px;font-size:16px;background:#00d4ff;border:none;cursor:pointer;color:#000;font-weight:bold;border-radius:4px;transition:all 0.3s}
        button:hover{background:#00ffff;transform:scale(1.05)}
        #game-over{font-size:24px;color:#ff6b6b;margin:10px 0}
    </style>
</head>
<body>
    <div id="game-container">
        <h1>🌟 星球收集者</h1>
        <canvas id="gameCanvas" width="800" height="600"></canvas>
        <div id="info">
            <span id="score">得分: 0</span> | <span id="level">关卡: 1</span> | <span id="combo">连击: 0</span>
        </div>
        <div id="game-over"></div>
        <button onclick="game.reset()">重新开始</button>
        <button onclick="togglePause()">暂停</button>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        const STARS = [
            {color:'#FFD700',symbol:'☀',value:10},
            {color:'#00CED1',symbol:'◆',value:20},
            {color:'#FF69B4',symbol:'●',value:30},
            {color:'#32CD32',symbol:'■',value:40}
        ];
        
        const GRID_SIZE = 5;
        const CELL_SIZE = 120;
        const PADDING = 40;
        
        let game = {
            grid: [],
            score: 0,
            level: 1,
            combo: 0,
            selected: null,
            gameOver: false,
            paused: false,
            
            init() {
                this.grid = [];
                this.score = 0;
                this.level = 1;
                this.combo = 0;
                this.selected = null;
                this.gameOver = false;
                this.paused = false;
                this.generateGrid();
                this.update();
            },
            
            generateGrid() {
                this.grid = [];
                for(let i=0;i<GRID_SIZE;i++){
                    this.grid[i] = [];
                    for(let j=0;j<GRID_SIZE;j++){
                        this.grid[i][j] = Math.floor(Math.random()*STARS.length);
                    }
                }
            },
            
            getRowCol(x,y){
                const col = Math.floor((x-PADDING)/CELL_SIZE);
                const row = Math.floor((y-PADDING)/CELL_SIZE);
                if(col>=0&&col<GRID_SIZE&&row>=0&&row<GRID_SIZE) return {row,col};
                return null;
            },
            
            click(x,y){
                if(this.gameOver||this.paused) return;
                const pos = this.getRowCol(x,y);
                if(!pos) return;
                
                if(this.selected&&this.selected.row===pos.row&&this.selected.col===pos.col){
                    this.selected = null;
                } else if(this.selected){
                    const dr=Math.abs(this.selected.row-pos.row);
                    const dc=Math.abs(this.selected.col-pos.col);
                    if((dr===1&&dc===0)||(dr===0&&dc===1)){
                        [this.grid[this.selected.row][this.selected.col],this.grid[pos.row][pos.col]]=[this.grid[pos.row][pos.col],this.grid[this.selected.row][this.selected.col]];
                        this.selected = null;
                        this.checkMatches();
                    } else {
                        this.selected = pos;
                    }
                } else {
                    this.selected = pos;
                }
            },
            
            checkMatches(){
                let matched = new Set();
                for(let i=0;i<GRID_SIZE;i++){
                    for(let j=0;j<GRID_SIZE;j++){
                        if(this.grid[i][j]===-1) continue;
                        let group=this.getGroup(i,j);
                        if(group.length>=3){
                            group.forEach(c=>matched.add(c));
                        }
                    }
                }
                if(matched.size>0){
                    this.combo++;
                    matched.forEach(c=>{
                        const [i,j]=c.split(',');
                        this.grid[i][j]=-1;
                        this.score+=STARS[this.grid[i][j]||0]?.value||10;
                    });
                    this.score+=this.combo*5;
                    this.gravity();
                    setTimeout(()=>this.checkMatches(),200);
                } else {
                    this.combo=0;
                }
                if(this.score>this.level*100){
                    this.level++;
                }
            },
            
            getGroup(i,j,visited=new Set()){
                const key=`${i},${j}`;
                if(visited.has(key)||i<0||i>=GRID_SIZE||j<0||j>=GRID_SIZE||this.grid[i][j]===-1) return [];
                visited.add(key);
                const type=this.grid[i][j];
                let group=[key];
                [[0,1],[0,-1],[1,0],[-1,0]].forEach(([di,dj])=>{
                    if(this.grid[i+di]?.[j+dj]===type){
                        group.push(...this.getGroup(i+di,j+dj,visited));
                    }
                });
                return group;
            },
            
            gravity(){
                for(let j=0;j<GRID_SIZE;j++){
                    let empty=GRID_SIZE-1;
                    for(let i=GRID_SIZE-1;i>=0;i--){
                        if(this.grid[i][j]!==-1){
                            if(i!==empty) this.grid[empty][j]=this.grid[i][j];
                            this.grid[i][j]=-1;
                            empty--;
                        }
                    }
                }
                for(let i=0;i<GRID_SIZE;i++){
                    for(let j=0;j<GRID_SIZE;j++){
                        if(this.grid[i][j]===-1){
                            this.grid[i][j]=Math.floor(Math.random()*STARS.length);
                        }
                    }
                }
            },
            
            update(){
                ctx.fillStyle='#0a1929';
                ctx.fillRect(0,0,canvas.width,canvas.height);
                for(let i=0;i<GRID_SIZE;i++){
                    for(let j=0;j<GRID_SIZE;j++){
                        const x=PADDING+j*CELL_SIZE;
                        const y=PADDING+i*CELL_SIZE;
                        const idx=this.grid[i][j];
                        if(idx===-1) idx=0;
                        ctx.fillStyle=STARS[idx].color;
                        ctx.fillRect(x+5,y+5,CELL_SIZE-10,CELL_SIZE-10);
                        if(this.selected?.row===i&&this.selected?.col===j){
                            ctx.strokeStyle='#ffff00';
                            ctx.lineWidth=3;
                            ctx.strokeRect(x+5,y+5,CELL_SIZE-10,CELL_SIZE-10);
                        }
                        ctx.fillStyle='#000';
                        ctx.font='bold 40px Arial';
                        ctx.textAlign='center';
                        ctx.textBaseline='middle';
                        ctx.fillText(STARS[idx].symbol,x+CELL_SIZE/2,y+CELL_SIZE/2);
                    }
                }
                document.getElementById('score').textContent=`得分: ${this.score}`;
                document.getElementById('level').textContent=`关卡: ${this.level}`;
                document.getElementById('combo').textContent=`连击: ${this.combo}`;
                if(!this.gameOver) requestAnimationFrame(()=>this.update());
            },
            
            reset(){
                this.init();
            }
        };
        
        canvas.addEventListener('click',(e)=>{
            const rect=canvas.getBoundingClientRect();
            game.click(e.clientX-rect.left,e.clientY-rect.top);
        });
        
        function togglePause(){
            game.paused=!game.paused;
        }
        
        game.init();
    </script>
</body>
</html>
