<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>星光收集器 - Star Collector</title>
    <style>
        body { margin: 0; padding: 20px; background: #1a1a2e; font-family: Arial, sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .container { text-align: center; }
        canvas { background: linear-gradient(135deg, #0f3460 0%, #16213e 100%); border: 3px solid #e94560; display: block; margin: 0 auto; cursor: none; }
        .info { color: #00d4ff; margin-top: 15px; font-size: 18px; font-weight: bold; }
        .controls { color: #00ff88; margin-top: 10px; font-size: 14px; }
        h1 { color: #e94560; margin: 0 0 10px 0; text-shadow: 0 0 10px rgba(233, 69, 96, 0.8); }
        .score { color: #ffff00; display: inline-block; margin: 0 20px; }
        .level { color: #00ff88; display: inline-block; margin: 0 20px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>✨ 星光收集器 ✨</h1>
        <div>
            <span class="score">分数: <span id="score">0</span></span>
            <span class="level">关卡: <span id="level">1</span></span>
        </div>
        <canvas id="game" width="800" height="600"></canvas>
        <div class="controls">
            <p>🎮 用鼠标移动篮子 | 收集⭐获得分数 | 躲避💣炸弹</p>
            <p id="gameStatus">点击开始游戏</p>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');
        
        class Game {
            constructor() {
                this.score = 0;
                this.level = 1;
                this.gameRunning = false;
                this.basket = { x: canvas.width / 2, y: canvas.height - 50, width: 60, height: 30, vx: 0 };
                this.stars = [];
                this.bombs = [];
                this.particles = [];
                this.mouseX = canvas.width / 2;
                this.gameTime = 0;
                this.baseSpawnRate = 0.03;
                this.spawnRate = this.baseSpawnRate;
                this.bombChance = 0.005;
                this.init();
            }
            
            init() {
                canvas.addEventListener('mousemove', (e) => {
                    const rect = canvas.getBoundingClientRect();
                    this.mouseX = Math.max(30, Math.min(canvas.width - 30, e.clientX - rect.left));
                });
                canvas.addEventListener('click', () => {
                    if (!this.gameRunning) this.start();
                    else if (this.gameOver) this.reset();
                });
                this.start();
            }
            
            start() {
                this.gameRunning = true;
                this.gameOver = false;
                document.getElementById('gameStatus').textContent = '游戏进行中...';
                this.gameLoop();
            }
            
            reset() {
                this.score = 0;
                this.level = 1;
                this.gameTime = 0;
                this.stars = [];
                this.bombs = [];
                this.particles = [];
                this.spawnRate = this.baseSpawnRate;
                this.start();
            }
            
            update() {
                this.gameTime++;
                
                // 篮子跟随鼠标
                this.basket.x += (this.mouseX - this.basket.x) * 0.15;
                this.basket.x = Math.max(30, Math.min(canvas.width - 30, this.basket.x));
                
                // 生成星星
                if (Math.random() < this.spawnRate) {
                    this.stars.push({
                        x: Math.random() * (canvas.width - 20) + 10,
                        y: -10,
                        vx: (Math.random() - 0.5) * 2,
                        vy: Math.random() * 1 + 2,
                        radius: 6,
                        rotation: 0
                    });
                }
                
                // 生成炸弹
                if (Math.random() < this.bombChance && this.stars.length < 15) {
                    this.bombs.push({
                        x: Math.random() * (canvas.width - 20) + 10,
                        y: -10,
                        vx: (Math.random() - 0.5) * 1.5,
                        vy: Math.random() * 1 + 1.5,
                        radius: 8
                    });
                }
                
                // 更新星星
                this.stars = this.stars.filter(star => {
                    star.x += star.vx;
                    star.y += star.vy;
                    star.vy += 0.1; // 重力
                    star.rotation += 0.1;
                    
                    // 检测篮子碰撞
                    const dx = star.x - this.basket.x;
                    const dy = star.y - this.basket.y;
                    if (Math.sqrt(dx*dx + dy*dy) < 50) {
                        this.score += 10;
                        this.createParticles(star.x, star.y, '⭐');
                        return false;
                    }
                    
                    return star.y < canvas.height;
                });
                
                // 更新炸弹
                this.bombs = this.bombs.filter(bomb => {
                    bomb.x += bomb.vx;
                    bomb.y += bomb.vy;
                    bomb.vy += 0.08;
                    
                    // 检测篮子碰撞
                    const dx = bomb.x - this.basket.x;
                    const dy = bomb.y - this.basket.y;
                    if (Math.sqrt(dx*dx + dy*dy) < 50) {
                        this.gameOver = true;
                        this.createParticles(bomb.x, bomb.y, '💥');
                        return false;
                    }
                    
                    return bomb.y < canvas.height;
                });
                
                // 更新粒子
                this.particles = this.particles.filter(p => {
                    p.x += p.vx;
                    p.y += p.vy;
                    p.life--;
                    return p.life > 0;
                });
                
                // 关卡升级
                if (this.score > 0 && this.score % 100 === 0) {
                    const newLevel = Math.floor(this.score / 100) + 1;
                    if (newLevel !== this.level) {
                        this.level = newLevel;
                        this.spawnRate = this.baseSpawnRate + (this.level - 1) * 0.02;
                        this.bombChance = 0.005 + (this.level - 1) * 0.002;
                    }
                }
            }
            
            draw() {
                // 清空背景
                ctx.fillStyle = 'rgba(15, 52, 96, 0.3)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                
                // 绘制星星
                this.stars.forEach(star => {
                    ctx.save();
                    ctx.translate(star.x, star.y);
                    ctx.rotate(star.rotation);
                    ctx.fillStyle = '#ffff00';
                    ctx.font = '20px Arial';
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillText('⭐', 0, 0);
                    ctx.restore();
                });
                
                // 绘制炸弹
                this.bombs.forEach(bomb => {
                    ctx.fillStyle = '#ff3333';
                    ctx.beginPath();
                    ctx.arc(bomb.x, bomb.y, bomb.radius, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.fillStyle = '#000';
                    ctx.font = '16px Arial';
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillText('💣', bomb.x, bomb.y);
                });
                
                // 绘制篮子
                ctx.fillStyle = '#00ff88';
                ctx.fillRect(this.basket.x - this.basket.width/2, this.basket.y, this.basket.width, this.basket.height);
                ctx.fillStyle = '#00cc66';
                ctx.fillRect(this.basket.x - this.basket.width/2 + 2, this.basket.y + 2, this.basket.width - 4, 4);
                
                // 绘制粒子
                this.particles.forEach(p => {
                    ctx.fillStyle = p.text;
                    ctx.font = `${p.size}px Arial`;
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.globalAlpha = p.life / 30;
                    ctx.fillText(p.text, p.x, p.y);
                    ctx.globalAlpha = 1;
                });
                
                // 更新UI
                document.getElementById('score').textContent = this.score;
                document.getElementById('level').textContent = this.level;
                
                if (this.gameOver) {
                    ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
                    ctx.fillRect(0, 0, canvas.width, canvas.height);
                    ctx.fillStyle = '#ff3333';
                    ctx.font = 'bold 40px Arial';
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillText('游戏结束!', canvas.width/2, canvas.height/2 - 40);
                    ctx.fillStyle = '#ffff00';
                    ctx.font = '24px Arial';
                    ctx.fillText(`最终分数: ${this.score}`, canvas.width/2, canvas.height/2 + 20);
                    document.getElementById('gameStatus').textContent = '点击重新开始';
                }
            }
            
            createParticles(x, y, emoji) {
                for (let i = 0; i < 5; i++) {
                    this.particles.push({
                        x: x,
                        y: y,
                        vx: (Math.random() - 0.5) * 3,
                        vy: (Math.random() - 1) * 2,
                        life: 30,
                        text: emoji,
                        size: 16 + Math.random() * 8
                    });
                }
            }
            
            gameLoop() {
                this.update();
                this.draw();
                requestAnimationFrame(() => this.gameLoop());
            }
        }
        
        new Game();
    </script>
</body>
</html>
