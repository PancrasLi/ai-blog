<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>星际跑酷者 - Cosmic Runner</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #0a0e27 0%, #1a1a3e 100%);
            font-family: 'Arial', sans-serif;
            color: #fff;
        }
        
        .container {
            position: relative;
            width: 800px;
            height: 600px;
            background: linear-gradient(to bottom, #1a0033 0%, #330066 50%, #000011 100%);
            border: 3px solid #00ff88;
            box-shadow: 0 0 20px rgba(0, 255, 136, 0.5);
            overflow: hidden;
        }
        
        canvas {
            display: block;
            width: 100%;
            height: 100%;
            background: transparent;
        }
        
        .ui {
            position: absolute;
            top: 10px;
            left: 10px;
            z-index: 10;
            color: #00ff88;
            font-size: 14px;
            font-weight: bold;
        }
        
        .ui-item {
            margin-bottom: 8px;
            text-shadow: 0 0 10px rgba(0, 255, 136, 0.5);
        }
        
        .score { color: #ffaa00; }
        .level { color: #00ffff; }
        .health { color: #ff0066; }
        
        .game-over {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            background: rgba(0, 0, 0, 0.95);
            padding: 30px;
            border-radius: 10px;
            border: 2px solid #00ff88;
            z-index: 100;
            display: none;
        }
        
        .game-over.show {
            display: block;
            animation: pulse 0.5s;
        }
        
        @keyframes pulse {
            0% { transform: translate(-50%, -50%) scale(0.8); opacity: 0; }
            100% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
        }
        
        .game-over h1 {
            font-size: 36px;
            margin-bottom: 20px;
            color: #ff0066;
        }
        
        .game-over p {
            font-size: 18px;
            margin-bottom: 10px;
            color: #00ff88;
        }
        
        .game-over button {
            background: #00ff88;
            color: #000;
            border: none;
            padding: 10px 30px;
            font-size: 16px;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 20px;
            font-weight: bold;
            transition: all 0.3s;
        }
        
        .game-over button:hover {
            background: #00ffbb;
            transform: scale(1.05);
        }
        
        .instructions {
            position: absolute;
            bottom: 10px;
            right: 10px;
            font-size: 12px;
            color: #00ff88;
            text-align: right;
            opacity: 0.8;
        }
    </style>
</head>
<body>
    <div class="container">
        <canvas id="gameCanvas" width="800" height="600"></canvas>
        
        <div class="ui">
            <div class="ui-item score">分数: <span id="scoreValue">0</span></div>
            <div class="ui-item level">等级: <span id="levelValue">1</span></div>
            <div class="ui-item health">生命: <span id="healthValue">3</span></div>
        </div>
        
        <div class="game-over" id="gameOverScreen">
            <h1>游戏结束</h1>
            <p>最终分数: <span id="finalScore">0</span></p>
            <p>到达等级: <span id="finalLevel">1</span></p>
            <button onclick="location.reload()">重新开始</button>
        </div>
        
        <div class="instructions">
            <div>↑↓ 或 W/S 移动</div>
            <div>躲避障碍物 | 收集星星加分</div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        // 游戏状态
        const game = {
            running: true,
            score: 0,
            level: 1,
            health: 3,
            speed: 5,
            baseSpeed: 5,
            difficultyMultiplier: 1
        };
        
        // 玩家
        const player = {
            x: canvas.width / 2 - 15,
            y: canvas.height - 50,
            width: 30,
            height: 40,
            velY: 0,
            speed: 6
        };
        
        // 输入处理
        const keys = {};
        window.addEventListener('keydown', (e) => {
            keys[e.key.toLowerCase()] = true;
        });
        window.addEventListener('keyup', (e) => {
            keys[e.key.toLowerCase()] = false;
        });
        
        // 障碍物
        const obstacles = [];
        const stars = [];
        
        function createObstacle() {
            if (Math.random() > 0.95) {
                obstacles.push({
                    x: Math.random() * (canvas.width - 50),
                    y: -30,
                    width: 50,
                    height: 30,
                    speed: game.speed
                });
            }
        }
        
        function createStar() {
            if (Math.random() > 0.98 && stars.length < 5) {
                stars.push({
                    x: Math.random() * (canvas.width - 20),
                    y: -20,
                    size: 10,
                    speed: game.speed * 0.8
                });
            }
        }
        
        function updateGame() {
            if (!game.running) return;
            
            // 更新玩家位置
            if (keys['arrowup'] || keys['w']) {
                player.y = Math.max(0, player.y - player.speed);
            }
            if (keys['arrowdown'] || keys['s']) {
                player.y = Math.min(canvas.height - player.height, player.y + player.speed);
            }
            player.x = Math.max(0, Math.min(canvas.width - player.width, player.x));
            
            // 更新难度
            if (game.score > 0 && game.score % 500 === 0 && game.level < 10) {
                game.level++;
                game.speed = game.baseSpeed + (game.level - 1) * 1.5;
                game.difficultyMultiplier = 1 + (game.level - 1) * 0.3;
            }
            
            // 创建障碍物和星星
            createObstacle();
            createStar();
            
            // 更新障碍物
            for (let i = obstacles.length - 1; i >= 0; i--) {
                obstacles[i].y += obstacles[i].speed;
                
                // 碰撞检测
                if (checkCollision(player, obstacles[i])) {
                    game.health--;
                    obstacles.splice(i, 1);
                    if (game.health <= 0) {
                        endGame();
                    }
                } else if (obstacles[i].y > canvas.height) {
                    game.score += 10 * game.level;
                    obstacles.splice(i, 1);
                }
            }
            
            // 更新星星
            for (let i = stars.length - 1; i >= 0; i--) {
                stars[i].y += stars[i].speed;
                
                if (checkStarCollision(player, stars[i])) {
                    game.score += 50 * game.level;
                    stars.splice(i, 1);
                } else if (stars[i].y > canvas.height) {
                    stars.splice(i, 1);
                }
            }
            
            updateUI();
        }
        
        function checkCollision(player, obstacle) {
            return player.x < obstacle.x + obstacle.width &&
                   player.x + player.width > obstacle.x &&
                   player.y < obstacle.y + obstacle.height &&
                   player.y + player.height > obstacle.y;
        }
        
        function checkStarCollision(player, star) {
            const dx = player.x + player.width / 2 - (star.x + star.size);
            const dy = player.y + player.height / 2 - (star.y + star.size);
            return Math.sqrt(dx * dx + dy * dy) < player.width / 2 + star.size;
        }
        
        function drawGame() {
            // 背景
            ctx.fillStyle = '#000011';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // 星空背景
            drawStarfield();
            
            // 绘制玩家
            drawPlayer();
            
            // 绘制障碍物
            obstacles.forEach(obs => {
                ctx.fillStyle = '#ff3366';
                ctx.shadowColor = 'rgba(255, 51, 102, 0.5)';
                ctx.shadowBlur = 10;
                ctx.fillRect(obs.x, obs.y, obs.width, obs.height);
                ctx.shadowColor = 'transparent';
            });
            
            // 绘制星星
            stars.forEach(star => {
                ctx.fillStyle = '#ffff00';
                ctx.shadowColor = 'rgba(255, 255, 0, 0.8)';
                ctx.shadowBlur = 10;
                ctx.beginPath();
                ctx.arc(star.x + star.size, star.y + star.size, star.size, 0, Math.PI * 2);
                ctx.fill();
                ctx.shadowColor = 'transparent';
            });
        }
        
        function drawPlayer() {
            ctx.fillStyle = '#00ff88';
            ctx.shadowColor = 'rgba(0, 255, 136, 0.7)';
            ctx.shadowBlur = 15;
            
            // 绘制玩家飞船
            ctx.beginPath();
            ctx.moveTo(player.x + player.width / 2, player.y);
            ctx.lineTo(player.x + player.width, player.y + player.height);
            ctx.lineTo(player.x, player.y + player.height);
            ctx.closePath();
            ctx.fill();
            
            // 尾焰效果
            ctx.fillStyle = 'rgba(255, 100, 0, 0.6)';
            ctx.fillRect(player.x + 10, player.y + player.height, 10, 15);
            
            ctx.shadowColor = 'transparent';
        }
        
        function drawStarfield() {
            ctx.fillStyle = '#ffffff';
            ctx.globalAlpha = 0.5;
            for (let i = 0; i < 100; i++) {
                const x = (i * 7) % canvas.width;
                const y = (i * 11 + game.score * 0.5) % canvas.height;
                ctx.fillRect(x, y, 2, 2);
            }
            ctx.globalAlpha = 1;
        }
        
        function updateUI() {
            document.getElementById('scoreValue').textContent = game.score;
            document.getElementById('levelValue').textContent = game.level;
            document.getElementById('healthValue').textContent = game.health;
        }
        
        function endGame() {
            game.running = false;
            document.getElementById('finalScore').textContent = game.score;
            document.getElementById('finalLevel').textContent = game.level;
            document.getElementById('gameOverScreen').classList.add('show');
        }
        
        function gameLoop() {
            updateGame();
            drawGame();
            requestAnimationFrame(gameLoop);
        }
        
        // 启动游戏
        gameLoop();
    </script>
</body>
</html>
